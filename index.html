<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>🐉 名古屋金澤親子冒險之旅 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Klee+One:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM — 旅遊手帳 × 龍珠金氣 × 輕毛玻璃
   ═══════════════════════════════════════════════════ */

/* ─── TOKENS ─── */
:root {
  /* Palette */
  --bg:          #F7F7F9;          /* 冷白底 */
  --bg-warm:     #FAFAF8;
  --surface:     rgba(255,255,255,0.82);
  --surface-mid: rgba(255,255,255,0.62);
  --surface-low: rgba(255,255,255,0.44);

  /* Gold — only accent, never background */
  --gold:        #C9933A;
  --gold-light:  #E8B84B;
  --gold-pale:   rgba(201,147,58,0.12);
  --gold-glow:   rgba(201,147,58,0.28);

  /* Brand red (keep functional identity) */
  --red:         #E8453C;
  --red-pale:    rgba(232,69,60,0.10);
  --red-glow:    rgba(232,69,60,0.22);

  /* Blue */
  --blue:        #3B82F6;
  --blue-pale:   rgba(59,130,246,0.10);

  /* Ink */
  --ink:         #1E1E2C;
  --ink-2:       #3D3D52;
  --ink-soft:    rgba(30,30,44,0.52);
  --ink-faint:   rgba(30,30,44,0.14);
  --ink-ghost:   rgba(30,30,44,0.07);

  /* Radii */
  --r-xl: 22px;
  --r-lg: 18px;
  --r-md: 12px;
  --r-sm: 8px;
  --r-xs: 6px;

  /* Shadows */
  --shadow-xs:  0 1px 4px rgba(0,0,0,0.06);
  --shadow-sm:  0 2px 10px rgba(0,0,0,0.07);
  --shadow-md:  0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg:  0 8px 32px rgba(0,0,0,0.09);
  --shadow-gold-hover: 0 8px 28px rgba(201,147,58,0.20), 0 2px 8px rgba(0,0,0,0.07);

  /* Typography */
  --font-title:  'Zen Maru Gothic', 'Noto Sans TC', -apple-system, sans-serif;
  --font-body:   'Klee One', 'Noto Sans TC', -apple-system, 'PingFang TC', sans-serif;

  /* Legacy aliases (keep JS working) */
  --accent:           var(--red);
  --accent-blue:      var(--blue);
  --accent-gold:      #E8B84B;
  --accent-glow:      var(--red-glow);
  --accent-blue-glow: rgba(59,130,246,0.25);
  --glass-bg:         var(--surface-mid);
  --glass-border:     rgba(255,255,255,0.72);
  --glass-shadow:     var(--shadow-md);
}

/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { height: 100%; }

/* ─── BACKGROUND ─── */
body {
  font-family: var(--font-body);
  font-weight: 400;
  background-color: var(--bg);
  /* Subtle linen texture via repeating gradient */
  background-image:
    radial-gradient(ellipse 70% 55% at 105% -5%,  rgba(201,147,58,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 50% at -10% 110%,  rgba(59,130,246,0.06) 0%, transparent 65%),
    radial-gradient(ellipse 80% 60% at 50% 50%,   rgba(255,255,255,0.4) 0%, transparent 100%);
  background-attachment: fixed;
  min-height: 100vh;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Floating particles —淡金色，極緩 */
.bg-orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  filter: blur(72px); opacity: 0.13;
}
.bg-orb-1 { width: 320px; height: 320px; background: radial-gradient(#E8B84B, transparent); top: -60px; right: -60px; animation: orbDrift 22s ease-in-out infinite; }
.bg-orb-2 { width: 260px; height: 260px; background: radial-gradient(#93C5FD, transparent); bottom: 80px; left: -50px; animation: orbDrift 28s ease-in-out infinite reverse; }
.bg-orb-3 { width: 180px; height: 180px; background: radial-gradient(#E8B84B, transparent); top: 42%; right: -30px; animation: orbDrift 18s ease-in-out infinite 4s; }
@keyframes orbDrift {
  0%,100% { transform: translateY(0px) translateX(0px); }
  33%     { transform: translateY(-18px) translateX(8px); }
  66%     { transform: translateY(10px) translateX(-6px); }
}

/* ─── APP SHELL ─── */
.app-shell {
  max-width: 460px; margin: 0 auto; min-height: 100vh;
  position: relative; overflow-x: hidden; padding-bottom: 130px; z-index: 1;
}

/* ─── CARD SYSTEM ─── */
.glass-card {
  background: var(--surface);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.75);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-sm);
  position: relative; overflow: hidden;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
/* Shimmer — only on hover, subtle */
.glass-card::before {
  content: '';
  position: absolute; top: 0; left: -80%; width: 55%; height: 100%;
  background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.38) 50%, transparent 70%);
  transition: left 0.55s ease; pointer-events: none; z-index: 1;
}
.glass-card:hover::before { left: 140%; }
.glass-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-gold-hover);
}
.glass-card > * { position: relative; z-index: 2; }

/* Glow variants */
.glass-card.glow-red:hover  { box-shadow: 0 8px 28px var(--red-glow); }
.glass-card.glow-blue:hover { box-shadow: 0 8px 28px rgba(59,130,246,0.18); }
.glass-card.glow-gold       { box-shadow: 0 4px 18px var(--gold-glow); }
/* No infinite pulse — keep it calm */

/* ─── ENTRANCE ANIMATION ─── */
.fade-up {
  opacity: 0; transform: translateY(20px);
  animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
.delay-1 { animation-delay: 0.06s; }
.delay-2 { animation-delay: 0.12s; }
.delay-3 { animation-delay: 0.18s; }
.delay-4 { animation-delay: 0.24s; }
.delay-5 { animation-delay: 0.30s; }
.delay-6 { animation-delay: 0.36s; }

/* ════════════════════════════════
   TYPOGRAPHY SYSTEM
   ════════════════════════════════ */

/* H1 / Page title */
.hero-title {
  font-family: var(--font-title);
  font-size: 23px; font-weight: 800; line-height: 1.35; color: var(--ink);
  letter-spacing: -0.3px;
}
.hero-title span { color: var(--red); }

/* Card headings / landmark names */
.card-title,
.rcard-name,
.route-name,
.activity-title,
.hotel-name,
.team-name,
.day-mission-title,
.dragonball-title,
.dragon-wish-title,
.dlabel,
.rgroup-title {
  font-family: var(--font-title);
  font-weight: 700;
  letter-spacing: -0.2px;
}
.card-title        { font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
.rcard-name        { font-size: 14px; margin-bottom: 6px; line-height: 1.45; }
.route-name        { font-size: 14px; margin-bottom: 5px; }
.activity-title    { font-size: 15px; line-height: 1.4; margin-bottom: 4px; }
.hotel-name        { font-size: 14px; margin-bottom: 2px; }
.team-name         { font-size: 18px; margin: 5px 0 4px; }
.day-mission-title { font-size: 16px; line-height: 1.3; }
.dragonball-title  { font-size: 17px; color: var(--ink); }
.dragon-wish-title { font-size: 18px; color: #92660A; }
.dlabel            { font-size: 14px; }
.rgroup-title      { font-size: 14px; margin: 14px 0 6px; }

/* Body / description text */
.activity-desc,
.rcard-desc,
.weather-tip,
.detail-panel-inner p,
.sos-note,
.bubble,
.pack-text,
.shop-text {
  font-family: var(--font-body);
  font-weight: 400;
  line-height: 1.7;
  color: var(--ink-2);
}
.activity-desc  { font-size: 13px; }
.rcard-desc     { font-size: 12.5px; color: var(--ink-soft); }
.weather-tip    { font-size: 12px; }
.sos-note       { font-size: 11px; color: var(--ink-soft); margin-top: 4px; line-height: 1.6; font-weight: 400; }
.pack-text      { font-size: 13px; font-weight: 500; }
.shop-text      { font-size: 13px; font-weight: 500; }

/* Tags / auxiliary / small */
.activity-time, .weather-daylabel, .weather-source, .team-label,
.team-dates, .hotel-city, .nav-label, .tag, .route-tag, .hero-tag,
.db-name, .expense-payer, .shop-source, .atk-popup,
.total-label, .payer-chip .pname, .weather-temp-range,
.pack-cat-title, .dragonball-subtitle {
  font-family: var(--font-body);
  font-weight: 400;
  color: var(--ink-soft);
}
.activity-time    { font-size: 10.5px; font-weight: 500; color: var(--red); }
.weather-daylabel { font-size: 11px; font-weight: 500; }
.team-label       { font-size: 10px; font-weight: 500; letter-spacing: 1.8px; text-transform: uppercase; opacity: 0.55; }
.team-dates       { font-size: 12px; font-weight: 400; opacity: 0.7; }
.hotel-city       { font-size: 11px; font-weight: 400; margin-bottom: 9px; }
.nav-label        { font-size: 9.5px; font-weight: 500; white-space: nowrap; }
.db-name          { font-size: 9.5px; line-height: 1.35; text-align: center; max-width: 64px; }
.db-name.unlocked-name { color: var(--ink); font-weight: 600; }
.expense-payer    { font-size: 11px; font-weight: 400; margin-top: 1px; }
.shop-source      { font-size: 10.5px; font-weight: 400; margin-top: 2px; }
.total-label      { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.55; }
.payer-chip .pname{ font-size: 10px; font-weight: 500; }
.weather-temp-range{ font-size: 12px; font-weight: 500; }
.pack-cat-title   { font-size: 12.5px; font-weight: 700; margin: 0 0 8px 2px; display: flex; align-items: center; gap: 7px; font-family: var(--font-title); color: var(--ink); }
.dragonball-subtitle { font-size: 11px; font-weight: 400; margin-top: 4px; }
.weather-source   { font-size: 10px; font-weight: 500; }

/* Phrase box Japanese text */
.phrase-jp { font-family: var(--font-title); font-weight: 700; color: var(--red); }
.phrase-zh { font-family: var(--font-body); font-weight: 400; color: var(--ink-soft); }

/* Budget chip */
.activity-budget {
  font-family: var(--font-body);
  font-size: 11.5px; font-weight: 500; color: #92660A;
  background: rgba(201,147,58,0.10);
  display: inline-block; padding: 4px 10px;
  border-radius: var(--r-sm);
  border: 1px solid rgba(201,147,58,0.22);
  margin-top: 8px;
}

/* ════════════════════════════════
   HEADER
   ════════════════════════════════ */
.app-header {
  padding: 16px 16px 0;
}
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

.header-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--red); color: #fff;
  font-family: var(--font-title); font-size: 11px; font-weight: 700;
  padding: 5px 13px; border-radius: 999px; letter-spacing: 0.5px;
  box-shadow: 0 3px 12px var(--red-glow);
}

.header-hero {
  padding: 16px 16px 18px;
  background: var(--surface);
  border-radius: var(--r-lg);
  border: 1px solid rgba(255,255,255,0.8);
  box-shadow: var(--shadow-sm);
  margin-bottom: 4px;
}
.hero-sub { font-size: 12px; font-family: var(--font-body); color: var(--ink-soft); margin-top: 7px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.85); border: 1px solid rgba(201,147,58,0.22);
  padding: 3px 10px; border-radius: 999px;
  font-size: 11px; font-weight: 500; color: var(--gold);
  font-family: var(--font-body);
}

/* ════════════════════════════════
   BOTTOM NAV
   ════════════════════════════════ */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; max-width: 460px; margin: 0 auto;
  display: flex; justify-content: space-around; align-items: center;
  background: rgba(250,250,248,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.8);
  padding: 10px 4px calc(10px + env(safe-area-inset-bottom));
  z-index: 100;
  box-shadow: 0 -1px 0 var(--ink-faint), 0 -6px 20px rgba(0,0,0,0.04);
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer; font-family: var(--font-body);
  color: var(--ink-soft); padding: 4px 2px; border-radius: 14px; transition: color 0.18s;
}
.nav-icon { font-size: 20px; line-height: 1; transition: transform 0.22s; }
.nav-tab.active { color: var(--red); }
.nav-tab.active .nav-icon {
  transform: translateY(-2px) scale(1.1);
  filter: drop-shadow(0 2px 6px var(--red-glow));
}

/* FAB */
.fab-ai {
  position: fixed; bottom: 94px; right: 16px;
  width: 54px; height: 54px; border-radius: 50%; border: none; cursor: pointer;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center; font-size: 24px;
  border: 2.5px solid rgba(255,255,255,0.9);
  box-shadow: 0 4px 18px var(--gold-glow);
  animation: fabDrift 4s ease-in-out infinite; z-index: 95;
}
@keyframes fabDrift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

/* ════════════════════════════════
   CONTENT / LAYOUT
   ════════════════════════════════ */
.tab-content { padding: 6px 14px 10px; }
.tab-inner { display: flex; flex-direction: column; gap: 10px; }

.section-title {
  font-family: var(--font-body); font-size: 11px; font-weight: 500;
  color: var(--ink-soft); letter-spacing: 2px; text-transform: uppercase;
  margin: 14px 2px 5px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--ink-faint), transparent); }

/* ════════════════════════════════
   DAY PILL TABS
   ════════════════════════════════ */
.day-tabs-wrap { position: relative; margin-bottom: 2px; }
.day-tabs-wrap::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 12px; width: 28px;
  background: linear-gradient(90deg, transparent, var(--bg));
  pointer-events: none; z-index: 2;
}
.day-tabs {
  display: flex; gap: 7px; overflow-x: auto; padding: 4px 2px 12px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch; cursor: grab;
}
.day-tabs::-webkit-scrollbar { display: none; }

.day-pill, .date-pill {
  flex: 0 0 auto; min-width: 54px; padding: 9px 5px 8px; border-radius: 14px;
  border: 1px solid var(--ink-faint);
  background: var(--surface);
  color: var(--ink-soft); cursor: pointer; transition: all 0.18s;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  font-family: var(--font-body); box-shadow: var(--shadow-xs);
}
.day-pill .dp-weekday, .date-pill .dp-weekday { font-size: 9.5px; font-weight: 500; letter-spacing: 0.4px; opacity: 0.65; }
.day-pill .dp-date,    .date-pill .dp-date    { font-family: var(--font-title); font-size: 18px; font-weight: 800; line-height: 1.2; }
.day-pill .dp-month,   .date-pill .dp-month   { font-size: 9px; font-weight: 400; opacity: 0.6; }

.day-pill.active, .date-pill.active {
  background: var(--red); color: #fff; border-color: transparent;
  box-shadow: 0 3px 12px var(--red-glow);
}
.day-pill.active .dp-date { font-family: var(--font-title); }

.day-pill.overview-pill {
  flex-direction: row; align-items: center; gap: 5px;
  padding: 8px 13px; font-weight: 700; font-size: 12px; white-space: nowrap;
  font-family: var(--font-title);
}

/* ════════════════════════════════
   WEATHER CARD
   ════════════════════════════════ */
.weather-card {
  padding: 15px; border-radius: var(--r-lg);
  background: linear-gradient(135deg, rgba(255,249,235,0.88) 0%, rgba(235,244,255,0.88) 100%);
  border: 1px solid rgba(255,255,255,0.82);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  box-shadow: var(--shadow-sm);
}
.weather-top-row { display: flex; align-items: center; gap: 12px; }
.weather-icon-box {
  flex: 0 0 52px; width: 52px; height: 52px; border-radius: 14px;
  background: rgba(255,255,255,0.8); display: flex; align-items: center;
  justify-content: center; font-size: 28px; box-shadow: var(--shadow-xs);
}
.weather-mid { flex: 1; min-width: 0; }
.weather-stats-row { display: flex; align-items: baseline; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.weather-temp-big {
  font-family: var(--font-title); font-size: 26px; font-weight: 800; color: var(--red);
}
.weather-rain-chip {
  font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--blue);
  background: rgba(255,255,255,0.75); padding: 3px 9px;
  border-radius: 999px; display: inline-flex; align-items: center; gap: 3px;
  border: 1px solid rgba(59,130,246,0.15);
}
.weather-source {
  display: inline-flex; align-items: center; gap: 4px; margin-top: 7px;
  font-size: 10px; color: var(--ink-soft);
  background: rgba(255,255,255,0.6); padding: 3px 9px; border-radius: 999px;
  border: 1px solid var(--ink-faint);
}
.weather-source.live { color: #16A34A; border-color: rgba(22,163,74,0.2); }
.weather-tip {
  margin-top: 9px; font-size: 12px; line-height: 1.65;
  background: rgba(255,255,255,0.6); padding: 8px 11px; border-radius: var(--r-sm);
  border-left: 2.5px solid var(--gold-light);
  color: var(--ink-2);
}

/* ════════════════════════════════
   ACTIVITY CARDS
   ════════════════════════════════ */
.activity-card { padding: 14px; }
.activity-card.done .activity-title,
.activity-card.done .activity-desc,
.activity-card.done .activity-budget { opacity: 0.38; text-decoration: line-through; }

.activity-row { display: flex; gap: 10px; align-items: flex-start; }
.drag-handle {
  flex: 0 0 18px; color: var(--ink-faint); font-size: 13px; cursor: grab;
  padding: 4px 0; line-height: 0.6; letter-spacing: -2px; margin-top: 5px;
}

/* Check circle — gold on done */
.check-circle {
  flex: 0 0 27px; width: 27px; height: 27px; border-radius: 50%;
  border: 1.5px solid var(--ink-faint);
  background: rgba(255,255,255,0.85);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; cursor: pointer; transition: all 0.22s;
  margin-top: 2px; user-select: none; position: relative;
}
.check-circle.checked {
  border-color: transparent;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  box-shadow: 0 0 0 3px var(--gold-pale), 0 2px 8px var(--gold-glow);
  animation: checkPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes checkPop { 0% { transform: scale(0.6); } 60% { transform: scale(1.18); } 100% { transform: scale(1); } }
.check-circle.checked::after {
  content: '✦'; position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--gold-light); animation: starPop 0.5s ease forwards;
  pointer-events: none;
}
@keyframes starPop { 0% { opacity: 1; transform: translateX(-50%) scale(0) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) scale(1.4) translateY(-10px); } }

.activity-content { flex: 1; min-width: 0; }

.activity-time {
  font-size: 10.5px; font-weight: 500; color: var(--red);
  background: var(--red-pale); display: inline-block;
  padding: 2px 8px; border-radius: 999px; margin-bottom: 4px;
}

.activity-photo { width: 100%; border-radius: var(--r-md); margin-top: 10px; display: block; object-fit: cover; height: 148px; }
.activity-photo-credit { font-size: 9px; color: var(--ink-soft); margin-top: 3px; text-align: right; font-family: var(--font-body); }
.activity-footer { display: flex; justify-content: flex-end; margin-top: 8px; }

/* Phrase box */
.phrase-box {
  margin-top: 8px; background: rgba(201,147,58,0.07);
  border-left: 2.5px solid var(--gold-light);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  padding: 8px 11px; font-size: 12px; line-height: 1.65;
}
.phrase-jp { font-size: 12.5px; display: block; margin-bottom: 2px; }
.phrase-zh { font-size: 11.5px; }

/* ─── TAGS ─── */
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.tag { font-size: 10.5px; font-weight: 500; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 3px; font-family: var(--font-body); }
.tag-eat    { background: rgba(232,69,60,0.09);   color: #B91C1C; border: 1px solid rgba(232,69,60,0.18); }
.tag-order  { background: rgba(201,147,58,0.10);  color: #92660A; border: 1px solid rgba(201,147,58,0.2); }
.tag-buy    { background: rgba(34,197,94,0.09);   color: #15803D; border: 1px solid rgba(34,197,94,0.18); }
.tag-reserve{ background: rgba(59,130,246,0.09);  color: #1D4ED8; border: 1px solid rgba(59,130,246,0.18); }

/* Detail toggle */
.detail-toggle {
  margin-top: 9px; display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 500; color: var(--gold);
  cursor: pointer; user-select: none; background: none; border: none;
  font-family: var(--font-body); padding: 0;
}
.detail-toggle .chev { transition: transform 0.22s; font-size: 9px; }
.detail-toggle.open .chev { transform: rotate(180deg); }
.detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.detail-panel.open { max-height: 800px; }
.detail-panel-inner { padding-top: 8px; }
.detail-panel-inner p { font-size: 12px; line-height: 1.7; }

/* Nav button */
.nav-btn {
  border: none; border-radius: 50%;
  width: 38px; height: 38px; min-width: unset; padding: 0;
  font-size: 18px; line-height: 1;
  background: rgba(0,0,0,0.06); color: inherit;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: none;
  transition: transform 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:active { transform: scale(0.90); background: rgba(0,0,0,0.10); }

/* More popover */
.item-actions { position: relative; flex: 0 0 auto; }
.more-btn {
  width: 26px; height: 26px; border-radius: 50%; border: none;
  background: transparent; display: flex; align-items: center; justify-content: center;
  font-size: 15px; cursor: pointer; color: var(--ink-soft); letter-spacing: 1px;
}
.more-popover {
  display: none; position: absolute; top: 30px; right: 0; z-index: 30;
  background: rgba(255,255,255,0.97); backdrop-filter: blur(14px);
  border-radius: var(--r-md); box-shadow: var(--shadow-lg);
  padding: 5px; gap: 3px; flex-direction: column; min-width: 94px;
  border: 1px solid rgba(255,255,255,0.9);
}
.more-popover.open { display: flex; }
.more-popover button {
  display: flex; align-items: center; gap: 7px; border: none; background: none;
  border-radius: var(--r-sm); padding: 8px 10px;
  font-size: 12.5px; font-weight: 500; font-family: var(--font-body);
  cursor: pointer; color: var(--ink); white-space: nowrap;
}
.more-popover button:hover { background: var(--ink-ghost); }
.more-popover button.danger { color: var(--red); }

/* Inline edit form */
.inline-edit-form {
  display: flex; flex-direction: column; gap: 7px;
  margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--ink-faint);
}
.inline-edit-form input,
.inline-edit-form textarea {
  border: 1px solid var(--ink-faint); border-radius: var(--r-sm);
  padding: 9px 11px; font-size: 13px; font-family: var(--font-body);
  color: var(--ink); background: rgba(255,255,255,0.85); width: 100%; resize: vertical;
}
.inline-edit-form input:focus,
.inline-edit-form textarea:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
.inline-edit-row { display: flex; gap: 7px; }
.inline-edit-row > * { flex: 1; }
.inline-edit-actions { display: flex; gap: 7px; }
.inline-edit-actions .btn-save {
  flex: 1; background: var(--red); color: #fff; border: none;
  border-radius: var(--r-sm); padding: 9px; font-weight: 700; font-size: 13px;
  cursor: pointer; font-family: var(--font-title);
}
.inline-edit-actions .btn-cancel {
  background: var(--ink-ghost); color: var(--ink-soft); border: none;
  border-radius: var(--r-sm); padding: 9px 14px; font-weight: 500;
  font-size: 13px; cursor: pointer; font-family: var(--font-body);
}

/* ════════════════════════════════
   RESTAURANT CARDS
   ════════════════════════════════ */
.rcard {
  flex: 0 0 82%; background: var(--surface-mid); border-radius: var(--r-lg);
  padding: 14px; border: 1px solid rgba(255,255,255,0.78);
  backdrop-filter: blur(10px); box-shadow: var(--shadow-sm);
  scroll-snap-align: start;
}
.rcard.done .rcard-name, .rcard.done .rcard-desc { opacity: 0.38; text-decoration: line-through; }
.rcard-check-row { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }
.rgroup-scroll {
  display: flex; gap: 10px; overflow-x: auto; padding: 0 0 12px;
  margin: 0 -14px; padding-left: 14px; padding-right: 14px;
  scrollbar-width: none; scroll-snap-type: x mandatory;
}
.rgroup-scroll::-webkit-scrollbar { display: none; }

/* ════════════════════════════════
   ROUTE TIMELINE
   ════════════════════════════════ */
.route-timeline { position: relative; padding-left: 36px; margin-top: 4px; }
.route-timeline::before {
  content: ''; position: absolute; left: 13px; top: 6px; bottom: 6px; width: 2px;
  background: linear-gradient(180deg, var(--red) 0%, var(--blue) 100%);
  border-radius: 2px; opacity: 0.3;
}
.route-node { position: relative; margin-bottom: 5px; padding: 7px 0; }
.route-dot {
  position: absolute; left: -36px; top: 3px; width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,0.9); border: 2px solid var(--red);
  display: flex; align-items: center; justify-content: center; font-size: 13px;
  box-shadow: var(--shadow-xs);
}
.route-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.route-tag {
  font-size: 10px; font-weight: 400; background: var(--red-pale); color: var(--red);
  padding: 2px 7px; border-radius: 999px; border: 1px solid rgba(232,69,60,0.15);
  font-family: var(--font-body);
}
.route-connector { position: relative; display: flex; align-items: center; gap: 6px; margin: 3px 0; padding: 4px 0; }
.route-connector .conn-pill {
  position: absolute; left: -36px; top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(59,130,246,0.10); display: flex; align-items: center;
  justify-content: center; font-size: 13px; border: 1.5px solid rgba(59,130,246,0.22);
}
.route-connector .conn-label {
  background: var(--blue-pale); color: var(--blue); padding: 4px 11px;
  border-radius: 999px; font-size: 11px; font-weight: 500;
  border: 1px solid rgba(59,130,246,0.15); font-family: var(--font-body);
}

/* ════════════════════════════════
   TEAM / INFO CARDS
   ════════════════════════════════ */
.team-card {
  padding: 16px; border-radius: var(--r-lg);
  background: linear-gradient(135deg, rgba(201,147,58,0.08) 0%, rgba(59,130,246,0.06) 100%);
  border: 1px solid rgba(255,255,255,0.8); backdrop-filter: blur(10px);
  box-shadow: var(--shadow-sm);
}

.pocket-card .pocket-item { display: flex; align-items: center; gap: 11px; padding: 7px 0; border-bottom: 1px dashed var(--ink-faint); }
.pocket-card .pocket-item:last-of-type { border-bottom: none; }
.pocket-text { font-size: 13px; font-weight: 500; transition: all 0.3s; }
.pocket-item.done .pocket-text { opacity: 0.38; text-decoration: line-through; }

/* ════════════════════════════════
   DRAGON BALLS
   ════════════════════════════════ */
.dragonball-section { padding: 18px; border-radius: var(--r-lg); }
.dragonball-header { text-align: center; margin-bottom: 16px; }

.dragonball-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.dragonball-grid .db-item:nth-child(4) { grid-column: 2; }
.db-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
.db-orb {
  width: 60px; height: 60px; border-radius: 50%; position: relative;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; transition: transform 0.18s;
}
.db-item:active .db-orb { transform: scale(0.88); }
.db-orb.locked {
  background: rgba(200,200,215,0.25);
  border: 1.5px dashed rgba(150,145,165,0.35);
}
.db-orb.unlocked {
  background: radial-gradient(circle at 35% 30%, rgba(255,255,210,0.95), #E8B84B 42%, #C9933A 80%);
  border: 2px solid rgba(201,147,58,0.55);
  box-shadow: 0 4px 16px rgba(201,147,58,0.4), 0 0 20px rgba(201,147,58,0.2);
  animation: dbShimmer 3.5s ease-in-out infinite;
}
@keyframes dbShimmer {
  0%,100% { box-shadow: 0 4px 16px rgba(201,147,58,0.4), 0 0 20px rgba(201,147,58,0.2); }
  50%     { box-shadow: 0 6px 24px rgba(201,147,58,0.55), 0 0 32px rgba(201,147,58,0.3); }
}
.db-orb .db-stars {
  position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
  font-size: 7.5px; letter-spacing: 1px; color: rgba(180,60,40,0.85);
  font-weight: 700; line-height: 1; font-family: var(--font-title);
}
.db-orb .db-icon-inner { font-size: 20px; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.18)); }

/* Dragon wish banner */
.dragon-wish-banner {
  display: none; padding: 16px; border-radius: var(--r-lg); text-align: center;
  background: linear-gradient(135deg, rgba(232,184,75,0.18), rgba(201,147,58,0.12));
  border: 1.5px solid rgba(201,147,58,0.4);
  box-shadow: 0 4px 24px var(--gold-glow);
}
.dragon-wish-banner.show { display: block; }
.dragon-wish-sub { font-size: 12px; color: rgba(146,102,10,0.8); margin-top: 5px; font-weight: 400; font-family: var(--font-body); }

/* Burst */
.burst-overlay { position: fixed; inset: 0; z-index: 200; pointer-events: none; display: flex; align-items: center; justify-content: center; }
.burst-particle { position: absolute; width: 9px; height: 9px; border-radius: 50%; animation: burstOut 0.55s ease-out forwards; }
@keyframes burstOut { 0% { transform: scale(0) translate(0,0); opacity: 1; } 100% { transform: scale(1) translate(var(--tx),var(--ty)); opacity: 0; } }
.burst-flash { position: absolute; inset: 0; border-radius: 50%; background: radial-gradient(circle, rgba(232,184,75,0.75) 0%, transparent 70%); animation: burstFlash 0.38s ease-out forwards; }
@keyframes burstFlash { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

.saiyan-celebrate { position: fixed; inset: 0; z-index: 300; pointer-events: none; background: radial-gradient(circle, rgba(232,184,75,0.3) 0%, transparent 70%); animation: celebratePulse 0.8s ease-in-out 3; }
@keyframes celebratePulse { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
.confetti-piece { position: absolute; width: 7px; height: 7px; border-radius: 2px; animation: confettiFall linear forwards; }
@keyframes confettiFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

/* ════════════════════════════════
   PACKING
   ════════════════════════════════ */
.progress-wrap { padding: 16px; border-radius: var(--r-lg); }
.progress-headline { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
.progress-headline .big { font-family: var(--font-title); font-size: 21px; font-weight: 800; color: var(--ink); }
.progress-headline .big span { color: var(--gold); }
.progress-headline .small { font-size: 12px; color: var(--ink-soft); font-weight: 400; font-family: var(--font-body); }
.progress-track { height: 10px; background: var(--ink-ghost); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--gold-light), var(--gold)); transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }

.pack-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border-radius: var(--r-md);
  padding: 11px 12px; margin-bottom: 6px;
  border: 1px solid rgba(255,255,255,0.78); box-shadow: var(--shadow-xs);
  transition: all 0.2s; position: relative; overflow: hidden;
}
.pack-item.done { opacity: 0.7; }
.pack-item.done .pack-text { opacity: 0.4; text-decoration: line-through; }

.atk-popup {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  font-size: 11px; font-weight: 700; color: var(--gold);
  background: var(--gold-pale); border-radius: 999px; padding: 2px 7px;
  animation: atkPop 1.2s ease-out forwards; pointer-events: none; white-space: nowrap;
  font-family: var(--font-title);
}
@keyframes atkPop {
  0%   { opacity: 0; transform: translateY(-50%) scale(0.6); }
  30%  { opacity: 1; transform: translateY(-50%) scale(1.08); }
  70%  { opacity: 1; transform: translateY(-62%) scale(1); }
  100% { opacity: 0; transform: translateY(-80%) scale(0.9); }
}

/* ════════════════════════════════
   SHOPPING
   ════════════════════════════════ */
.shop-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border-radius: var(--r-md);
  padding: 11px 12px; margin-bottom: 6px;
  border: 1px solid rgba(255,255,255,0.78); box-shadow: var(--shadow-xs);
  transition: all 0.32s ease; overflow: hidden;
}
.shop-item.sliding-out { transform: translateX(120%) scale(0.8); opacity: 0; max-height: 0; padding: 0; margin: 0; }
.shop-info { flex: 1; min-width: 0; }
.shop-item.done .shop-text { opacity: 0.4; text-decoration: line-through; }
.shop-budget {
  font-size: 11px; font-weight: 500; color: #92660A;
  background: var(--gold-pale); padding: 2px 8px;
  border-radius: 999px; white-space: nowrap; font-family: var(--font-body);
  border: 1px solid rgba(201,147,58,0.2);
}
.shop-delete { background: none; border: none; color: var(--ink-faint); font-size: 15px; cursor: pointer; padding: 4px 5px; flex: 0 0 auto; }
.shop-add-row { display: flex; gap: 7px; margin-top: 5px; }
.shop-add-row input {
  flex: 1; border: 1px solid var(--ink-faint); border-radius: var(--r-sm);
  padding: 10px 12px; font-size: 13px; font-family: var(--font-body);
  color: var(--ink); background: rgba(255,255,255,0.85);
}
.shop-add-row input:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
.shop-add-btn {
  background: var(--red); color: #fff; border: none; border-radius: var(--r-sm);
  padding: 10px 15px; font-weight: 700; font-size: 13px; cursor: pointer;
  font-family: var(--font-title); box-shadow: 0 2px 8px var(--red-glow);
}

/* ════════════════════════════════
   EXPENSE
   ════════════════════════════════ */
.total-card {
  border-radius: var(--r-lg); padding: 20px; text-align: center;
  background: linear-gradient(135deg, rgba(201,147,58,0.10) 0%, rgba(59,130,246,0.07) 100%);
  border: 1px solid rgba(255,255,255,0.82); backdrop-filter: blur(12px);
  box-shadow: var(--shadow-md);
}
.total-amount { font-family: var(--font-title); font-size: 30px; font-weight: 800; color: var(--ink); margin: 6px 0 2px; }
.total-sub { font-size: 11.5px; font-weight: 400; opacity: 0.6; font-family: var(--font-body); }
.payer-split { display: flex; gap: 10px; margin-top: 12px; }
.payer-chip {
  flex: 1; background: rgba(255,255,255,0.65); border-radius: var(--r-sm);
  padding: 8px 10px; text-align: left;
  border: 1px solid rgba(255,255,255,0.82); box-shadow: var(--shadow-xs);
}
.payer-chip .pamt { font-family: var(--font-title); font-size: 14px; font-weight: 700; margin-top: 2px; color: var(--ink); }

.day-expense-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
.dtotal { font-family: var(--font-title); font-size: 14px; font-weight: 700; color: var(--red); }

.expense-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--ink-faint); cursor: pointer; }
.expense-row:last-child { border-bottom: none; }
.expense-icon {
  flex: 0 0 30px; width: 30px; height: 30px; border-radius: 50%;
  background: var(--gold-pale); display: flex; align-items: center; justify-content: center; font-size: 14px;
}
.expense-info { flex: 1; min-width: 0; }
.expense-name { font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--ink); }
.expense-amt { font-family: var(--font-title); font-size: 13px; font-weight: 700; color: var(--ink); white-space: nowrap; }

.add-expense-btn {
  width: 100%; border: 1.5px dashed var(--ink-faint); background: none;
  border-radius: var(--r-md); padding: 10px; font-size: 12px; font-weight: 500;
  color: var(--ink-soft); cursor: pointer; font-family: var(--font-body); margin-top: 8px;
}
.exp-form { display: none; gap: 7px; flex-direction: column; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--ink-faint); }
.exp-form.open { display: flex; }
.exp-form input, .exp-form select {
  border: 1px solid var(--ink-faint); border-radius: var(--r-sm); padding: 9px 11px;
  font-size: 13px; font-family: var(--font-body); color: var(--ink); background: rgba(255,255,255,0.9);
}
.exp-form-row { display: flex; gap: 7px; }
.exp-form-row > * { flex: 1; }
.exp-save-btn {
  background: var(--red); color: #fff; border: none; border-radius: var(--r-sm);
  padding: 9px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: var(--font-title);
}
.exp-form-actions { display: flex; gap: 7px; }
.exp-form-actions .exp-save-btn { flex: 1; }
.exp-delete-btn {
  background: rgba(255,255,255,0.8); color: var(--red);
  border: 1px solid rgba(232,69,60,0.25); border-radius: var(--r-sm);
  padding: 9px 13px; font-weight: 500; font-size: 13px; cursor: pointer; font-family: var(--font-body);
}
.convert-row { display: flex; gap: 7px; margin-top: 10px; }
.convert-row input {
  flex: 1; border: 1px solid var(--ink-faint); border-radius: var(--r-sm);
  padding: 9px 11px; font-size: 13px; font-weight: 500;
  font-family: var(--font-body); color: var(--ink); background: rgba(255,255,255,0.9);
}
.convert-result { font-size: 12px; font-weight: 500; color: var(--blue); margin-top: 7px; font-family: var(--font-body); }

/* ════════════════════════════════
   SOS
   ════════════════════════════════ */
.sos-big {
  display: flex; align-items: center; gap: 13px; background: var(--surface);
  border-radius: var(--r-lg); padding: 14px; margin-bottom: 8px; text-decoration: none;
  color: var(--ink); border: 1px solid rgba(255,255,255,0.78); box-shadow: var(--shadow-xs);
  transition: transform 0.2s, box-shadow 0.2s;
}
.sos-big:hover { transform: translateY(-2px); box-shadow: var(--shadow-gold-hover); }
.sos-icon {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 19px; flex: 0 0 42px;
}
.sos-icon.police    { background: var(--blue-pale); }
.sos-icon.ambulance { background: var(--red-pale); }
.sos-icon.office    { background: var(--gold-pale); }
.sos-name   { font-family: var(--font-title); font-size: 13.5px; font-weight: 700; color: var(--ink); }
.sos-number { font-family: var(--font-title); font-size: 12px; font-weight: 700; color: var(--red); margin-top: 2px; }

.hotel-card {
  background: var(--surface); border-radius: var(--r-lg); padding: 13px 14px; margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.78); box-shadow: var(--shadow-xs);
}
.hotel-row { display: flex; gap: 7px; }
.hotel-row input {
  flex: 1; border: 1px solid var(--ink-faint); border-radius: var(--r-sm);
  padding: 9px 11px; font-size: 13px; font-family: var(--font-body); background: rgba(255,255,255,0.9); color: var(--ink);
}
.call-btn {
  border: none; border-radius: var(--r-sm); padding: 9px 14px; font-weight: 700;
  font-size: 12px; background: var(--red); color: #fff; cursor: pointer;
  font-family: var(--font-title); text-decoration: none; display: flex; align-items: center; gap: 5px; white-space: nowrap;
}

/* ════════════════════════════════
   SECTION HEADER
   ════════════════════════════════ */
.glass-section-header {
  padding: 11px 13px; border-radius: var(--r-sm); margin-bottom: 2px;
  background: rgba(255,255,255,0.6); border-left: 2.5px solid var(--gold);
}
.glass-section-header .title { font-family: var(--font-title); font-size: 13.5px; font-weight: 700; color: var(--ink); }
.glass-section-header .sub   { font-family: var(--font-body); font-size: 11px; color: var(--ink-soft); font-weight: 400; margin-top: 2px; }

/* ════════════════════════════════
   OVERLAYS / SHEETS / AI
   ════════════════════════════════ */
.overlay {
  position: fixed; inset: 0; background: rgba(15,10,30,0.38); z-index: 120;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.overlay.show { opacity: 1; pointer-events: auto; }
.sheet {
  background: rgba(252,252,250,0.97); backdrop-filter: blur(22px);
  border-radius: 22px 22px 0 0; width: 100%; max-width: 460px;
  padding: 13px 18px calc(20px + env(safe-area-inset-bottom));
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  box-shadow: 0 -6px 32px rgba(0,0,0,0.10);
}
.overlay.show .sheet { transform: translateY(0); }
.sheet-handle { width: 32px; height: 4px; background: var(--ink-faint); border-radius: 999px; margin: 0 auto 12px; }
.sheet-title { font-family: var(--font-title); font-size: 14px; font-weight: 700; margin-bottom: 12px; text-align: center; color: var(--ink); }
.sheet-btn {

   DAY DRAGON BALL WIDGET
   ════════════════════════════════ */
.day-dragonball-wrap {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 16px; border-radius: var(--r-lg);
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.82);
  box-shadow: var(--shadow-sm);
  cursor: pointer; user-select: none;
  transition: transform 0.18s, box-shadow 0.18s;
  position: relative; overflow: hidden;
}
.day-dragonball-wrap:active { transform: scale(0.98); }
.day-dragonball-wrap:hover  { box-shadow: var(--shadow-gold-hover); transform: translateY(-2px); }

/* The orb itself */
.day-db-orb {
  position: relative; flex: 0 0 60px; width: 60px; height: 60px;
  border-radius: 50%;
  transition: filter 0.45s ease, box-shadow 0.45s ease, background 0.45s ease, border-color 0.45s ease;
}

/* ── DIM: crystal glass ball ── */
.day-db-orb.dim {
  /* 立體球體感：左上白色高光 → 中間體色 → 右下暗部 */
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.82) 0%, rgba(255,255,255,0) 40%),
    radial-gradient(circle at 65% 72%, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0) 40%),
    radial-gradient(circle at 50% 50%, #E8C87A 0%, #C09040 45%, #7A5010 100%);
  border: 1.5px solid rgba(255,255,255,0.55);
  box-shadow:
    inset 0 2px 6px rgba(255,255,255,0.45),
    inset 0 -3px 8px rgba(0,0,0,0.18),
    0 3px 10px rgba(0,0,0,0.12);
  /* 灰白半透明水晶球：去色 + 半透明 */
  filter: grayscale(1) opacity(0.4);
}

/* ── LIT: vivid classic Dragon Ball ── */
.day-db-orb.lit {
  /* 傳統龍珠橘黃：左上強高光 + 中橘 + 底部深橘 */
  background:
    radial-gradient(circle at 32% 26%, rgba(255,255,220,0.95) 0%, rgba(255,240,100,0.6) 22%, rgba(255,255,255,0) 42%),
    radial-gradient(circle at 68% 74%, rgba(180,60,0,0.30) 0%, rgba(180,60,0,0) 45%),
    radial-gradient(circle at 50% 50%, #FFE050 0%, #FF9800 38%, #E65000 72%, #B03000 100%);
  border: 2px solid rgba(255,210,60,0.80);
  box-shadow:
    inset 0 3px 8px rgba(255,255,180,0.60),
    inset 0 -4px 10px rgba(140,40,0,0.25),
    0 0 0 3px rgba(255,180,20,0.18),
    0 4px 16px rgba(220,120,0,0.50),
    0 0 28px rgba(255,180,0,0.35);
  filter: none;
  animation: dbDayGlow 2.6s ease-in-out infinite;
}
@keyframes dbDayGlow {
  0%,100% {
    box-shadow:
      inset 0 3px 8px rgba(255,255,180,0.60),
      inset 0 -4px 10px rgba(140,40,0,0.25),
      0 0 0 3px rgba(255,180,20,0.18),
      0 4px 16px rgba(220,120,0,0.50),
      0 0 28px rgba(255,180,0,0.35);
  }
  50% {
    box-shadow:
      inset 0 3px 8px rgba(255,255,180,0.60),
      inset 0 -4px 10px rgba(140,40,0,0.25),
      0 0 0 6px rgba(255,180,20,0.26),
      0 6px 24px rgba(220,120,0,0.65),
      0 0 48px rgba(255,180,0,0.55);
  }
}

/* Primary highlight — top-left glint (both states) */
.day-db-orb::before {
  content: ''; position: absolute;
  top: 9px; left: 11px;
  width: 16px; height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.70);
  transform: rotate(-30deg);
  pointer-events: none; z-index: 3;
  filter: blur(1px);
}
/* Secondary micro-glint */
.day-db-orb::after {
  content: ''; position: absolute;
  top: 14px; left: 20px;
  width: 6px; height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.45);
  transform: rotate(-30deg);
  pointer-events: none; z-index: 3;
  filter: blur(0.5px);
}

/* Stars container */
.day-db-stars {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; flex-wrap: wrap; gap: 2px;
  padding: 16px 10px 10px 10px;
  z-index: 2;
}
.day-db-star {
  width: 7px; height: 7px; border-radius: 50%;
  background: #CC2000;
  border: 1px solid rgba(255,60,10,0.45);
  box-shadow: 0 1px 2px rgba(0,0,0,0.40);
  flex: 0 0 auto;
}
/* Lit stars: vivid red with glow */
.day-db-orb.lit .day-db-star {
  background: #DD1800;
  border-color: rgba(255,80,20,0.6);
  box-shadow: 0 0 5px rgba(255,60,10,0.70), 0 1px 2px rgba(0,0,0,0.25);
}
/* Dim stars: still visible through grayscale */
.day-db-orb.dim .day-db-star {
  background: #AA3300;
  border-color: rgba(180,60,10,0.4);
  box-shadow: none;
}

/* Text side */
.day-db-text { flex: 1; min-width: 0; }
.day-db-label {
  font-family: var(--font-title); font-size: 14px; font-weight: 700; color: var(--ink);
  line-height: 1.3; margin-bottom: 3px;
}
.day-db-sublabel {
  font-family: var(--font-body); font-size: 11px; color: var(--ink-soft); font-weight: 400; line-height: 1.5;
}
.day-db-sublabel.lit-text { color: var(--gold); font-weight: 600; }

/* Undo hint */
.day-db-undo {
  font-family: var(--font-body); font-size: 10px; color: var(--ink-soft);
  margin-top: 4px; opacity: 0.7;
}

/* Toast notification */
.db-toast {
  position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%) translateY(20px);
  z-index: 500; pointer-events: none;
  background: rgba(20,14,6,0.88); backdrop-filter: blur(12px);
  color: #fff; border-radius: 999px; padding: 10px 20px;
  font-family: var(--font-title); font-size: 13px; font-weight: 700;

.db-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

function applySavedOrder(){
  tripDays.forEach(day=>{
    const order = savedOrder[day.id];
    if(!order||!Array.isArray(order)) return;
    const bySort = {};
    day.activities.forEach(a=>{ bySort[a.sortId]=a; });
    const reordered = [];
    order.forEach(sid=>{ if(bySort[sid]){ reordered.push(bySort[sid]); delete bySort[sid]; } });
    Object.values(bySort).forEach(a=>reordered.push(a));
    if(reordered.length===day.activities.length) day.activities=reordered;
  });
}
function applyActivityEditsAndDeletes(){
  tripDays.forEach(day=>{
    day.activities = day.activities.filter(a=>!activityDeletes[a.sortId]);
    day.activities.forEach(a=>{
      const edit = activityEdits[a.sortId];
      if(edit){ if(edit.time!==undefined)a.time=edit.time; if(edit.title!==undefined)a.title=edit.title; if(edit.desc!==undefined)a.desc=edit.desc; if(edit.budget!==undefined)a.budget=edit.budget; }
    });
  });
}

const weatherCache = {};
async function loadWeatherFor(day){
  const w=day.weather;
  const iconEl=document.getElementById('weather-icon-'+day.id);
  const tempEl=document.getElementById('weather-temp-'+day.id);
  const rangeEl=document.getElementById('weather-range-'+day.id);
  const rainEl=document.getElementById('weather-rain-'+day.id);
  const sourceEl=document.getElementById('weather-source-'+day.id);
  if(!tempEl) return;
  if(weatherCache[day.id]){ paintWeather(day,weatherCache[day.id],iconEl,tempEl,rangeEl,rainEl,sourceEl); return; }
  const today=new Date(); const target=new Date(day.isoDate+'T00:00:00');
  const diffDays=Math.ceil((target-today)/86400000);
  if(diffDays>=0&&diffDays<=15){
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${w.lat}&longitude=${w.lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Asia%2FTokyo&start_date=${day.isoDate}&end_date=${day.isoDate}`;
      const res=await fetch(url); if(!res.ok) throw new Error();
      const data=await res.json();
      const tMax=data.daily?.temperature_2m_max?.[0]; const tMin=data.daily?.temperature_2m_min?.[0];
      const rain=data.daily?.precipitation_probability_max?.[0]; const code=data.daily?.weathercode?.[0];
      if(tMax===undefined||tMax===null) throw new Error();
      const result={temp:Math.round(tMax)+'°C',tempLow:(tMin!==undefined&&tMin!==null)?Math.round(tMin)+'°C':'',rain:(rain??0)+'%',icon:weatherIconFromCode(code),live:true};
      weatherCache[day.id]=result; paintWeather(day,result,iconEl,tempEl,rangeEl,rainEl,sourceEl); return;
    }catch(e){}
  }
  const fallback={temp:w.temp,tempLow:w.tempLow||'',rain:w.rain,icon:weatherIconFromRain(w.rain),live:false};
  weatherCache[day.id]=fallback; paintWeather(day,fallback,iconEl,tempEl,rangeEl,rainEl,sourceEl);
}
function paintWeather(day,result,iconEl,tempEl,rangeEl,rainEl,sourceEl){
  if(!document.getElementById('weather-temp-'+day.id)) return;
  if(iconEl) iconEl.textContent=result.icon;
  tempEl.textContent=result.temp;
  if(rangeEl) rangeEl.textContent=result.tempLow?('/ '+result.tempLow):'';
  rainEl.textContent='☔ '+result.rain;
  if(result.live){ sourceEl.textContent='📡 即時天氣預報'; sourceEl.classList.add('live'); }
  else{ sourceEl.textContent='歷史氣候參考值（'+day.weather.city+' 8月平均）'; sourceEl.classList.remove('live'); }
}
function weatherIconFromCode(code){
  if(code===undefined||code===null) return '🌤️';
  if(code===0) return '☀️'; if(code<=2) return '🌤️'; if(code<=3) return '⛅';
  if(code<=48) return '🌫️'; if(code<=67) return '🌧️'; if(code<=77) return '❄️';
  if(code<=82) return '🌦️'; if(code<=86) return '🌨️'; if(code<=95) return '⛈️'; return '🌤️';
}
function weatherIconFromRain(rainPct){
  const p=parseInt(rainPct,10)||0;
  if(p>=60) return '🌧️'; if(p>=30) return '🌦️'; if(p>=10) return '🌤️'; return '☀️';
}

const DAY_BALL_NAMES = ['一星珠','二星珠','三星珠','四星珠','五星珠','六星珠','七星珠'];

function renderDayDragonBall(dayId, dayIndex){

  const dayNum = dayIndex + 1;

  }

  const labelText = lit
    ? `Day ${dayNum}・${ballName} ✦ 任務達成！`
    : `Day ${dayNum}・點亮${ballName}`;
  const subText = lit
    ? `第 ${dayNum} 天行程圓滿完成 🎉`
    : `行程結束後點擊此龍珠來記錄`;
  const undoText = lit ? '（再次點擊可取消）' : '';

  return `
  <div class="day-dragonball-wrap fade-up" onclick="toggleDayBall('${dayId}',${dayIndex})" id="day-db-wrap-${dayId}">
    <div class="day-db-orb ${lit?'lit':'dim'}" id="day-db-orb-${dayId}">
      <div class="day-db-stars">${starDots}</div>
    </div>
    <div class="day-db-text">
      <div class="day-db-label" id="day-db-label-${dayId}">${labelText}</div>
      <div class="day-db-sublabel ${lit?'lit-text':''}" id="day-db-sub-${dayId}">${subText}</div>
      ${undoText ? `<div class="day-db-undo" id="day-db-undo-${dayId}">${undoText}</div>` : `<div class="day-db-undo" id="day-db-undo-${dayId}"></div>`}
    </div>
  </div>`;
}

let _toastTimer = null;
function showDayBallToast(msg){
  const toast = document.getElementById('db-toast');
  const msgEl = document.getElementById('db-toast-msg');
  if(!toast||!msgEl) return;
  msgEl.textContent = msg;
  toast.classList.add('show');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>{ toast.classList.remove('show'); },2800);
}

function toggleDayBall(dayId, dayIndex){
  const wasLit = !!dayBallLit[dayId];
  dayBallLit[dayId] = !wasLit;
  saveToStorage('jp2026_dayball_lit', dayBallLit);

  const nowLit = dayBallLit[dayId];
  const dayNum = dayIndex + 1;
  const ballName = DAY_BALL_NAMES[dayIndex];

  // Update orb class
  const orb = document.getElementById('day-db-orb-'+dayId);
  if(orb){ orb.className = 'day-db-orb ' + (nowLit ? 'lit' : 'dim'); }

  // Update text
  const label = document.getElementById('day-db-label-'+dayId);
  const sub   = document.getElementById('day-db-sub-'+dayId);
  const undo  = document.getElementById('day-db-undo-'+dayId);
  if(label) label.textContent = nowLit ? `Day ${dayNum}・${ballName} ✦ 任務達成！` : `Day ${dayNum}・點亮${ballName}`;
  if(sub){
    sub.textContent = nowLit ? `第 ${dayNum} 天行程圓滿完成 🎉` : `行程結束後點擊此龍珠來記錄`;
    sub.className = 'day-db-sublabel' + (nowLit?' lit-text':'');
  }
  if(undo) undo.textContent = nowLit ? '（再次點擊可取消）' : '';

  // Toast
  if(nowLit){
    // Micro burst on the orb
    triggerOrbBurst(dayId);
    showDayBallToast(`🌟 第 ${dayNum} 天任務達成！順利取得${ballName}！`);
  } else {
    showDayBallToast(`第 ${dayNum} 天龍珠已熄滅`);
  }
}

function triggerOrbBurst(dayId){
  const orb = document.getElementById('day-db-orb-'+dayId);
  if(!orb) return;
  const rect = orb.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const overlay = document.getElementById('burst-overlay');
  overlay.innerHTML = '';

  // Flash
  const flash = document.createElement('div'); flash.className='burst-flash';
  flash.style.cssText=`position:fixed;left:${cx-44}px;top:${cy-44}px;width:88px;height:88px;`;
  overlay.appendChild(flash);

  const colors = ['#FFD700','#E8B84B','#FFF0A0','#FFFFFF','#FFB800'];
  for(let i=0;i<12;i++){
    const p = document.createElement('div'); p.className='burst-particle';
    const angle = (i/12)*360;
    const dist = 36 + Math.random()*30;
    const tx = Math.cos(angle*Math.PI/180)*dist+'px';
    const ty = Math.sin(angle*Math.PI/180)*dist+'px';
    p.style.cssText = `left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};--tx:${tx};--ty:${ty};width:7px;height:7px;animation-delay:${i*0.015}s;`;
    overlay.appendChild(p);
  }
  setTimeout(()=>{ overlay.innerHTML=''; }, 700);
}

function deleteActivity(dayId,sortId){

   DRAG & DROP
   ========================================================= */
let dragState=null;
function getDayItemEls(dayId){ const l=document.getElementById('activity-list-'+dayId); return l?Array.from(l.children):[]; }
function persistOrderFromDOM(dayId){
  const els=getDayItemEls(dayId);
  const order=els.map(el=>el.dataset.sortid).filter(Boolean);
  savedOrder[dayId]=order; saveToStorage('jp2026_order_v1',savedOrder);
  const day=tripDays.find(d=>d.id===dayId); if(!day) return;
  const bySort={}; day.activities.forEach(a=>{ bySort[a.sortId]=a; });
  const reordered=[]; order.forEach(sid=>{ if(bySort[sid]){ reordered.push(bySort[sid]); delete bySort[sid]; } });
  Object.values(bySort).forEach(a=>reordered.push(a));
  if(reordered.length) day.activities=reordered;
}
function attachDragHandlers(dayId){
  const list=document.getElementById('activity-list-'+dayId); if(!list) return;
  Array.from(list.children).forEach(item=>{
    if(!item.dataset.sortid) return;
    item.addEventListener('dragstart',e=>{ dragState={dayId,el:item}; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    item.addEventListener('dragend',()=>{ item.classList.remove('dragging'); if(dragState) persistOrderFromDOM(dayId); dragState=null; });
    item.addEventListener('dragover',e=>{ e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault(); item.classList.remove('drag-over');
      if(!dragState||dragState.el===item) return;
      const rect=item.getBoundingClientRect(); const before=(e.clientY-rect.top)<rect.height/2;
      if(before) list.insertBefore(dragState.el,item); else list.insertBefore(dragState.el,item.nextSibling);
    });
  });
}

function getPackingCategoryItems(ci,cat){
  const items=[];
  cat.items.forEach((item,ii)=>{

    if(packingItemDeletes[key]) return;
    items.push({key,text:packingItemEdits[key]!==undefined?packingItemEdits[key]:item,isCustom:false});
  });
  packingCustomItems.filter(c=>c.cat===ci).forEach(c=>{
    if(packingItemDeletes[c.key]) return;
    items.push({key:c.key,text:packingItemEdits[c.key]!==undefined?packingItemEdits[c.key]:c.text,isCustom:true});
  });
  return items;
}

    <input type="text" id="exp-payer" placeholder="付款人" value="${e?escapeH(e.payer):''}">
    <div class="exp-form-actions">
      ${!isNew?`<button class="exp-delete-btn" onclick="deleteExpense('${dayId}','${id}')">刪除</button>`:''}
      <button class="exp-save-btn" onclick="saveExpense('${dayId}','${id}',${isNew})">${isNew?'新增':'更新'}</button>
    </div>
  </div>`;
}
function selectExpenseDay(d){ currentExpenseDay=d; editingExpenseId=null; expenseFormOpenDay=null; renderExpense(); }
function openEditExpense(dayId,id){ editingExpenseId=(editingExpenseId===id)?null:id; expenseFormOpenDay=null; renderExpense(); }
function toggleAddExpense(dayId){ expenseFormOpenDay=(expenseFormOpenDay===dayId)?null:dayId; editingExpenseId=null; renderExpense(); }
function saveExpense(dayId,id,isNew){
  const name=(document.getElementById('exp-name').value||'').trim();
  const amount=parseInt(document.getElementById('exp-amount').value)||0;
  const cat=document.getElementById('exp-cat').value;
  const payer=(document.getElementById('exp-payer').value||'').trim();
  if(!name||!amount) return;
  if(isNew){ dailyExpenses[dayId].push({id:'e-'+Date.now(),name,cat,amount,payer}); expenseFormOpenDay=null; }
  else { const e=dailyExpenses[dayId].find(x=>x.id===id); if(e){ e.name=name; e.cat=cat; e.amount=amount; e.payer=payer; } editingExpenseId=null; }
  saveToStorage('jp2026_expenses',dailyExpenses); renderExpense();
}
function deleteExpense(dayId,id){
  dailyExpenses[dayId]=dailyExpenses[dayId].filter(e=>e.id!==id);
  editingExpenseId=null; saveToStorage('jp2026_expenses',dailyExpenses); renderExpense();
}
function convertJPY(){
  const v=parseFloat(document.getElementById('jpy-input').value)||0;
  const r=document.getElementById('convert-result');
  if(!v){ r.textContent='輸入金額後立即換算'; return; }
  r.textContent=`¥ ${v.toLocaleString()} ≈ NT$ ${Math.round(v*0.22).toLocaleString()} / USD ${(v*0.0067).toFixed(2)}`;
}

/* =========================================================
   RENDER: SOS
   ========================================================= */
function renderSOS(){
  let html='<div class="tab-inner">';
  html+=`<div class="glass-section-header fade-up"><div class="title">🆘 緊急聯絡</div><div class="sub">遇到緊急情況先保持冷靜，再撥打相應號碼</div></div>`;
  sosEmergency.forEach((s,i)=>{
    html+=`<a class="sos-big glass-card fade-up delay-${i+1}" href="tel:${s.number}">
      <div class="sos-icon ${s.cls}">${s.icon}</div>
      <div><div class="sos-name">${s.name}</div><div class="sos-number">${s.number}</div><div class="sos-note">${s.note}</div></div>
    </a>`;
  });
  html+=`<div class="glass-section-header fade-up"><div class="title">🏨 飯店聯絡</div></div>`;
  sosHotels.forEach((h,i)=>{
    html+=`<div class="hotel-card fade-up delay-${i+1}">
      <div class="hotel-name">${h.name}</div><div class="hotel-city">📍 ${h.city}</div>
      <div class="hotel-row">
        <input type="tel" id="hotel-tel-${i}" placeholder="飯店電話">
        <button class="call-btn" onclick="callHotel(${i})">📞 撥打</button>
      </div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('tab-content').innerHTML=html;
}
function callHotel(i){
  const input=document.getElementById('hotel-tel-'+i); const num=(input.value||'').trim();
  if(!num){ input.focus(); input.placeholder='請先輸入飯店電話'; return; }
  window.location.href='tel:'+num.replace(/[^0-9+]/g,'');
}

/* =========================================================
   TAB SWITCHING
   ========================================================= */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(btn=>{ btn.classList.toggle('active',btn.dataset.tab===tab); });
  document.getElementById('tab-content').classList.remove('lego-mode');
  if(tab==='itinerary') renderItinerary();
  else if(tab==='packing') renderPacking();
  else if(tab==='shopping') renderShopping();
  else if(tab==='expense') renderExpense();
  else if(tab==='sos') renderSOS();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* =========================================================
   MAPS POPUP
   ========================================================= */
function openMapsPopup(title,query){
  document.getElementById('maps-sheet-title').textContent='導覽至「'+title+'」';
  const q=encodeURIComponent(query);
  document.getElementById('maps-google').href=`https://www.google.com/maps/search/?api=1&query=${q}`;
  document.getElementById('maps-apple').href=`https://maps.apple.com/?q=${q}`;
  document.getElementById('maps-overlay').classList.add('show');
}
function closeMapsPopup(){ document.getElementById('maps-overlay').classList.remove('show'); }
function closeMapsPopupOutside(e){ if(e.target.id==='maps-overlay') closeMapsPopup(); }

/* =========================================================
   AI CHAT
   ========================================================= */
function toggleAIChat(){
  const modal=document.getElementById('ai-modal');
  const opening=!modal.classList.contains('show');
  modal.classList.toggle('show');
  if(opening&&document.getElementById('ai-body').children.length===0) seedAIChat();
}
function closeAIChatOutside(e){ if(e.target.id==='ai-modal') toggleAIChat(); }
function appendBubble(text,who){
  const body=document.getElementById('ai-body');
  const div=document.createElement('div'); div.className='bubble '+who; div.textContent=text;
  body.appendChild(div); body.scrollTop=body.scrollHeight; return div;
}
function seedAIChat(){
  const body=document.getElementById('ai-body'); body.innerHTML='';
  appendBubble('嗨！我是超神旅遊助手 🐉 隨時可以問我這趟親子旅程的任何問題！','assistant');
  aiPresetTopics.forEach(t=>{ appendBubble(t.user,'user'); appendBubble(t.reply,'assistant'); });
}
function sendAIMessage(){
  const input=document.getElementById('ai-input'); const text=(input.value||'').trim(); if(!text) return;
  appendBubble(text,'user'); input.value='';
  const typing=appendBubble('✦ 戰鬥力蓄積中...','assistant');
  setTimeout(()=>{ typing.remove(); const topic=aiPresetTopics[aiTopicIndex%aiPresetTopics.length]; aiTopicIndex++; appendBubble('收到！'+topic.reply,'assistant'); },700);
}

/* =========================================================
   HORIZONTAL SCROLL DRAG (desktop)
   ========================================================= */
function enableHorizontalScrollDrag(selector){
  document.querySelectorAll(selector).forEach(el=>{
    if(el.dataset.hscrollBound) return; el.dataset.hscrollBound='1';
    let isDown=false,startX=0,startScroll=0;
    el.addEventListener('mousedown',e=>{ isDown=true; startX=e.pageX; startScroll=el.scrollLeft; el.style.cursor='grabbing'; });
    window.addEventListener('mouseup',()=>{ isDown=false; el.style.cursor=''; });
    window.addEventListener('mousemove',e=>{ if(!isDown) return; e.preventDefault(); el.scrollLeft=startScroll-(e.pageX-startX); });
    el.addEventListener('click',e=>{ if(Math.abs(el.scrollLeft-startScroll)>5){ e.stopPropagation(); e.preventDefault(); } },true);
    el.addEventListener('wheel',e=>{ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ el.scrollLeft+=e.deltaY; e.preventDefault(); } },{passive:false});
  });
}

/* =========================================================
   INIT
   ========================================================= */
initStorage();
renderItinerary();
document.querySelector('.nav-tab[data-tab="itinerary"]').classList.add('active');
</script>
