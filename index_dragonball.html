<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>🐉 名古屋金澤親子冒險之旅 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ===== ROOT VARS ===== */
:root {
  --accent: #FF3B30;
  --accent-blue: #007AFF;
  --accent-gold: #FFD700;
  --accent-glow: rgba(255,59,48,0.35);
  --accent-blue-glow: rgba(0,122,255,0.35);
  --glass-bg: rgba(255,255,255,0.40);
  --glass-border: rgba(255,255,255,0.60);
  --glass-shadow: 0 8px 32px rgba(180,100,120,0.12);
  --r-lg: 20px;
  --r-md: 14px;
  --r-sm: 10px;
  --ink: #3A2F3F;
  --ink-soft: rgba(58,47,63,0.55);
  --ink-faint: rgba(58,47,63,0.18);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
html, body { height: 100%; }

/* ===== ANIMATED BACKGROUND ===== */
body {
  font-family: 'Noto Sans TC', -apple-system, 'PingFang TC', sans-serif;
  background: linear-gradient(135deg, #FFE8EF 0%, #F0EAFF 30%, #E8F4FF 60%, #FFF0E8 100%);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  min-height: 100vh;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ===== FLOATING ORBS (atmosphere) ===== */
.bg-orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  filter: blur(60px); opacity: 0.22;
}
.bg-orb-1 { width: 300px; height: 300px; background: radial-gradient(#FF3B30, #FFB3AE); top: -80px; right: -80px; animation: orbFloat 8s ease-in-out infinite; }
.bg-orb-2 { width: 250px; height: 250px; background: radial-gradient(#007AFF, #B3D4FF); bottom: 100px; left: -60px; animation: orbFloat 10s ease-in-out infinite reverse; }
.bg-orb-3 { width: 200px; height: 200px; background: radial-gradient(#FFD700, #FFF3B3); top: 40%; right: -40px; animation: orbFloat 7s ease-in-out infinite 2s; }
@keyframes orbFloat { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }

/* ===== APP SHELL ===== */
.app-shell {
  max-width: 460px; margin: 0 auto; min-height: 100vh;
  position: relative; overflow-x: hidden; padding-bottom: 130px; z-index: 1;
}

/* ===== GLASS CARD ===== */
.glass-card {
  background: var(--glass-bg);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
  box-shadow: var(--glass-shadow);
  position: relative;
  overflow: hidden;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.glass-card::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.55) 50%, transparent 80%);
  transition: left 0.5s ease;
  pointer-events: none;
  z-index: 1;
}
.glass-card:hover::before { left: 150%; }
.glass-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(255,59,48,0.18), 0 0 20px var(--accent-glow);
}
.glass-card > * { position: relative; z-index: 2; }

/* PULSE GLOW VARIANTS */
.glass-card.glow-red:hover { box-shadow: 0 12px 40px rgba(255,59,48,0.25), 0 0 30px rgba(255,59,48,0.2); }
.glass-card.glow-blue:hover { box-shadow: 0 12px 40px rgba(0,122,255,0.25), 0 0 30px rgba(0,122,255,0.2); }
.glass-card.glow-gold { box-shadow: 0 8px 32px rgba(255,215,0,0.25), 0 0 20px rgba(255,215,0,0.15); animation: goldPulse 2s ease-in-out infinite; }
@keyframes goldPulse {
  0%,100% { box-shadow: 0 8px 32px rgba(255,215,0,0.25), 0 0 20px rgba(255,215,0,0.15); }
  50% { box-shadow: 0 12px 40px rgba(255,215,0,0.45), 0 0 40px rgba(255,215,0,0.3); }
}

/* ===== STAGGERED ENTRANCE ===== */
.fade-up {
  opacity: 0;
  transform: translateY(30px);
  animation: fadeUp 0.55s ease forwards;
}
@keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
.delay-1 { animation-delay: 0.08s; }
.delay-2 { animation-delay: 0.16s; }
.delay-3 { animation-delay: 0.24s; }
.delay-4 { animation-delay: 0.32s; }
.delay-5 { animation-delay: 0.40s; }
.delay-6 { animation-delay: 0.48s; }

/* ===== HEADER ===== */
.app-header {
  padding: 18px 18px 0;
  background: linear-gradient(180deg, rgba(255,232,239,0.6) 0%, transparent 100%);
}
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.header-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #FF3B30, #FF6B6B);
  color: #fff; font-size: 11px; font-weight: 900; padding: 5px 12px;
  border-radius: 999px; letter-spacing: 1px;
  box-shadow: 0 4px 14px rgba(255,59,48,0.35);
  animation: badgePulse 3s ease-in-out infinite;
}
@keyframes badgePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }

.header-hero {
  padding: 16px 18px 20px;
  background: linear-gradient(135deg, rgba(255,59,48,0.08) 0%, rgba(0,122,255,0.06) 100%);
  border-radius: var(--r-lg);
  margin-bottom: 4px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.5);
}
.hero-title { font-size: 22px; font-weight: 900; line-height: 1.3; color: var(--ink); }
.hero-title span { color: var(--accent); }
.hero-sub { font-size: 12px; color: var(--ink-soft); font-weight: 600; margin-top: 6px; display: flex; align-items: center; gap: 8px; }
.hero-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.7); border: 1px solid rgba(255,59,48,0.2);
  padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; color: var(--accent);
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; max-width: 460px; margin: 0 auto;
  display: flex; justify-content: space-around; align-items: center;
  background: rgba(255,248,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.7);
  padding: 10px 4px calc(10px + env(safe-area-inset-bottom)); z-index: 100;
  box-shadow: 0 -4px 24px rgba(180,100,120,0.12);
}
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer; font-family: inherit;
  color: var(--ink-soft); padding: 4px 0; border-radius: 14px; transition: all 0.2s;
}
.nav-icon { font-size: 20px; line-height: 1; transition: transform 0.25s; }
.nav-label { font-size: 9px; font-weight: 700; white-space: nowrap; letter-spacing: 0.3px; }
.nav-tab.active { color: var(--accent); }
.nav-tab.active .nav-icon { transform: translateY(-3px) scale(1.12); filter: drop-shadow(0 3px 8px rgba(255,59,48,0.45)); }

/* ===== FAB ===== */
.fab-ai {
  position: fixed; bottom: 96px; right: 18px; width: 58px; height: 58px;
  border-radius: 50%; border: none; cursor: pointer;
  background: linear-gradient(135deg, #FF3B30 0%, #FF6B6B 100%);
  display: flex; align-items: center; justify-content: center; font-size: 26px;
  border: 3px solid rgba(255,255,255,0.8);
  box-shadow: 0 6px 20px rgba(255,59,48,0.4), 0 0 30px rgba(255,59,48,0.2);
  animation: fabFloat 3s ease-in-out infinite; z-index: 95;
}
@keyframes fabFloat { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-7px) rotate(3deg); } }

/* ===== CONTENT ===== */
.tab-content { padding: 6px 16px 10px; }
.tab-inner { display: flex; flex-direction: column; gap: 12px; }
.section-title {
  font-size: 12px; font-weight: 800; color: var(--ink-soft);
  letter-spacing: 2px; text-transform: uppercase;
  margin: 14px 4px 6px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--ink-faint), transparent); }

.card-title { font-size: 15px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }

/* ===== DAY TABS ===== */
.day-tabs-wrap { position: relative; margin-bottom: 4px; }
.day-tabs-wrap::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 12px; width: 32px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,235,245,0.95) 100%);
  pointer-events: none; z-index: 2;
}
.day-tabs {
  display: flex; gap: 8px; overflow-x: auto; padding: 6px 2px 12px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch; cursor: grab;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-pill, .date-pill {
  flex: 0 0 auto; min-width: 58px; padding: 10px 6px 9px; border-radius: 16px;
  border: 1.5px solid rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  color: var(--ink-soft); cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  font-family: inherit; box-shadow: 0 2px 8px rgba(180,100,120,0.08);
}
.day-pill .dp-weekday, .date-pill .dp-weekday { font-size: 10px; font-weight: 800; letter-spacing: 0.5px; opacity: 0.7; }
.day-pill .dp-date, .date-pill .dp-date { font-size: 19px; font-weight: 900; line-height: 1.2; }
.day-pill .dp-month, .date-pill .dp-month { font-size: 9px; font-weight: 700; opacity: 0.65; }
.day-pill.active, .date-pill.active {
  background: linear-gradient(135deg, #FF3B30, #FF6B6B);
  color: #fff; border-color: transparent;
  box-shadow: 0 4px 16px rgba(255,59,48,0.4), 0 0 20px rgba(255,59,48,0.2);
}
.day-pill.overview-pill {
  flex-direction: row; align-items: center; gap: 6px;
  padding: 8px 14px; font-weight: 800; font-size: 12.5px; white-space: nowrap;
}

/* ===== WEATHER CARD ===== */
.weather-card {
  padding: 16px; border-radius: var(--r-lg);
  background: linear-gradient(135deg, rgba(255,232,239,0.7) 0%, rgba(230,240,255,0.7) 100%);
  border: 1px solid rgba(255,255,255,0.7);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 20px rgba(180,100,120,0.1);
}
.weather-top-row { display: flex; align-items: center; gap: 14px; }
.weather-icon-box {
  flex: 0 0 56px; width: 56px; height: 56px; border-radius: 16px;
  background: rgba(255,255,255,0.7); display: flex; align-items: center;
  justify-content: center; font-size: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.weather-mid { flex: 1; min-width: 0; }
.weather-daylabel { font-size: 11px; font-weight: 700; color: var(--ink-soft); }
.day-mission-title { font-size: 16px; font-weight: 800; line-height: 1.3; }
.weather-stats-row { display: flex; align-items: baseline; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
.weather-temp-big { font-size: 26px; font-weight: 900; color: var(--accent); }
.weather-temp-range { font-size: 12px; color: var(--ink-soft); font-weight: 700; }
.weather-rain-chip {
  font-size: 12px; font-weight: 700; color: #3B82F6;
  background: rgba(255,255,255,0.75); padding: 3px 9px;
  border-radius: 999px; display: inline-flex; align-items: center; gap: 3px;
}
.weather-source { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; font-size: 10px; font-weight: 700; color: var(--ink-soft); background: rgba(255,255,255,0.6); padding: 3px 9px; border-radius: 999px; }
.weather-source.live { color: #22C55E; }
.weather-tip { margin-top: 9px; font-size: 12px; font-weight: 500; line-height: 1.6; color: var(--ink); background: rgba(255,255,255,0.55); padding: 8px 10px; border-radius: var(--r-sm); }

/* ===== ACTIVITY CARDS ===== */
.activity-card { padding: 14px; margin-bottom: 0; }
.activity-card.done .activity-title,
.activity-card.done .activity-desc,
.activity-card.done .activity-budget { opacity: 0.4; text-decoration: line-through; }
.activity-row { display: flex; gap: 10px; align-items: flex-start; }
.drag-handle { flex: 0 0 20px; color: var(--ink-faint); font-size: 14px; cursor: grab; padding: 4px 0; line-height: 0.6; letter-spacing: -2px; margin-top: 4px; }

/* SAIYAN CHECK CIRCLE */
.check-circle {
  flex: 0 0 28px; width: 28px; height: 28px; border-radius: 50%;
  border: 2.5px solid var(--ink-faint);
  background: rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; cursor: pointer; transition: all 0.25s; margin-top: 2px;
  user-select: none; position: relative;
}
.check-circle.checked {
  border-color: transparent;
  background: linear-gradient(135deg, #FF3B30, #FFD700);
  box-shadow: 0 0 0 3px rgba(255,59,48,0.2), 0 0 12px rgba(255,215,0,0.4);
  animation: saiyanPop 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
}
@keyframes saiyanPop {
  0% { transform: scale(0.5); }
  50% { transform: scale(1.25); }
  70% { transform: scale(0.9); }
  100% { transform: scale(1); }
}
/* Star burst on check */
.check-circle.checked::after {
  content: '✦'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: var(--accent-gold); animation: starPop 0.5s ease forwards;
}
@keyframes starPop { 0% { opacity: 1; transform: translateX(-50%) scale(0) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) scale(1.5) translateY(-10px); } }

.activity-content { flex: 1; min-width: 0; }
.activity-time {
  font-size: 10.5px; font-weight: 800; color: var(--accent);
  background: rgba(255,59,48,0.1); display: inline-block;
  padding: 2px 8px; border-radius: 999px; margin-bottom: 5px;
}
.activity-title { font-size: 15px; font-weight: 800; line-height: 1.4; margin-bottom: 4px; }
.activity-desc { font-size: 12.5px; line-height: 1.65; color: rgba(58,47,63,0.75); font-weight: 500; }
.activity-budget {
  margin-top: 8px; font-size: 11.5px; font-weight: 700; color: #B45309;
  background: rgba(255,215,0,0.15); display: inline-block;
  padding: 4px 10px; border-radius: var(--r-sm);
  border: 1px solid rgba(255,215,0,0.3);
}
.activity-photo { width: 100%; border-radius: var(--r-md); margin-top: 10px; display: block; object-fit: cover; height: 148px; }
.activity-photo-credit { font-size: 9px; color: var(--ink-soft); margin-top: 3px; text-align: right; }
.activity-footer { display: flex; justify-content: flex-end; margin-top: 8px; }

/* ===== TAGS ===== */
.tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.tag { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 3px; }
.tag-eat { background: rgba(255,59,48,0.12); color: #C0392B; border: 1px solid rgba(255,59,48,0.2); }
.tag-order { background: rgba(255,165,0,0.12); color: #92610A; border: 1px solid rgba(255,165,0,0.2); }
.tag-buy { background: rgba(34,197,94,0.12); color: #166534; border: 1px solid rgba(34,197,94,0.2); }
.tag-reserve { background: rgba(0,122,255,0.12); color: #1D4ED8; border: 1px solid rgba(0,122,255,0.2); }

/* ===== DETAIL TOGGLE ===== */
.detail-toggle {
  margin-top: 10px; display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 700; color: var(--accent);
  cursor: pointer; user-select: none; background: none; border: none;
  font-family: inherit; padding: 0;
}
.detail-toggle .chev { transition: transform 0.25s; font-size: 10px; }
.detail-toggle.open .chev { transform: rotate(180deg); }
.detail-panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.detail-panel.open { max-height: 800px; }
.detail-panel-inner { padding-top: 9px; font-size: 12px; line-height: 1.7; color: rgba(58,47,63,0.7); font-weight: 500; }

/* ===== PHRASE BOX ===== */
.phrase-box {
  margin-top: 9px; background: rgba(255,59,48,0.07);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  padding: 8px 11px; font-size: 12px; line-height: 1.6;
}
.phrase-jp { font-weight: 800; color: var(--accent); display: block; margin-bottom: 2px; }
.phrase-zh { color: var(--ink-soft); font-weight: 500; }

/* ===== NAV BTN ===== */
.nav-btn {
  border: none; border-radius: 999px; padding: 7px 14px;
  font-size: 11.5px; font-weight: 700;
  background: linear-gradient(135deg, #FF3B30, #FF6B6B);
  color: #fff; cursor: pointer;
  box-shadow: 0 3px 12px rgba(255,59,48,0.35);
  display: flex; align-items: center; gap: 4px; font-family: inherit;
  transition: transform 0.15s, box-shadow 0.15s;
}
.nav-btn:active { transform: scale(0.96); }

/* ===== MORE POPOVER ===== */
.item-actions { position: relative; flex: 0 0 auto; }
.more-btn { width: 26px; height: 26px; border-radius: 50%; border: none; background: transparent; display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; color: var(--ink-soft); letter-spacing: 1px; }
.more-popover { display: none; position: absolute; top: 30px; right: 0; z-index: 30; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-radius: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.14); padding: 6px; gap: 4px; flex-direction: column; min-width: 96px; border: 1px solid rgba(255,255,255,0.8); }
.more-popover.open { display: flex; }
.more-popover button { display: flex; align-items: center; gap: 7px; border: none; background: none; border-radius: 9px; padding: 8px 10px; font-size: 12.5px; font-weight: 700; font-family: inherit; cursor: pointer; color: var(--ink); white-space: nowrap; }
.more-popover button:hover { background: rgba(255,59,48,0.07); }
.more-popover button.danger { color: var(--accent); }

/* ===== INLINE EDIT FORM ===== */
.inline-edit-form { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--ink-faint); }
.inline-edit-form input, .inline-edit-form textarea { border: 1.5px solid var(--ink-faint); border-radius: var(--r-sm); padding: 9px 11px; font-size: 13px; font-family: inherit; color: var(--ink); background: rgba(255,255,255,0.7); width: 100%; resize: vertical; }
.inline-edit-form input:focus, .inline-edit-form textarea:focus { outline: 2px solid var(--accent); }
.inline-edit-row { display: flex; gap: 8px; }
.inline-edit-row > * { flex: 1; }
.inline-edit-actions { display: flex; gap: 8px; }
.inline-edit-actions .btn-save { flex: 1; background: linear-gradient(135deg, #FF3B30, #FF6B6B); color: #fff; border: none; border-radius: var(--r-sm); padding: 9px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit; }
.inline-edit-actions .btn-cancel { background: rgba(0,0,0,0.07); color: var(--ink-soft); border: none; border-radius: var(--r-sm); padding: 9px 16px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit; }

/* ===== RESTAURANT CARDS ===== */
.rgroup-title { font-size: 14px; font-weight: 800; margin: 14px 0 6px; display: flex; align-items: center; gap: 6px; }
.rgroup-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 0 12px; margin: 0 -16px; padding-left: 16px; padding-right: 16px; scrollbar-width: none; scroll-snap-type: x mandatory; }
.rgroup-scroll::-webkit-scrollbar { display: none; }
.rcard {
  flex: 0 0 82%; background: rgba(255,255,255,0.55); border-radius: var(--r-lg);
  padding: 14px; border: 1px solid rgba(255,255,255,0.7);
  backdrop-filter: blur(10px); box-shadow: 0 4px 16px rgba(180,100,120,0.1);
  scroll-snap-align: start;
}
.rcard-name { font-size: 14px; font-weight: 800; margin-bottom: 6px; line-height: 1.4; }
.rcard-desc { font-size: 12px; color: rgba(58,47,63,0.7); line-height: 1.6; }
.rcard.done .rcard-name, .rcard.done .rcard-desc { opacity: 0.4; text-decoration: line-through; }
.rcard-check-row { display: flex; align-items: center; gap: 9px; margin-bottom: 7px; }

/* ===== ROUTE TIMELINE ===== */
.route-timeline { position: relative; padding-left: 36px; margin-top: 4px; }
.route-timeline::before { content: ''; position: absolute; left: 13px; top: 6px; bottom: 6px; width: 3px; background: linear-gradient(180deg, #FF3B30 0%, #007AFF 100%); border-radius: 3px; opacity: 0.4; }
.route-node { position: relative; margin-bottom: 6px; padding: 7px 0; }
.route-dot { position: absolute; left: -36px; top: 3px; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.8); border: 2.5px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 2px 8px rgba(255,59,48,0.25); }
.route-name { font-size: 14px; font-weight: 800; margin-bottom: 5px; }

function applySavedOrder(){
  tripDays.forEach(day=>{
    const order = savedOrder[day.id];
    if(!order||!Array.isArray(order)) return;
    const bySort = {};
    day.activities.forEach(a=>{ bySort[a.sortId]=a; });
    const reordered = [];
    order.forEach(sid=>{ if(bySort[sid]){ reordered.push(bySort[sid]); delete bySort[sid]; } });
    Object.values(bySort).forEach(a=>reordered.push(a));
    if(reordered.length===day.activities.length) day.activities=reordered;
  });
}
function applyActivityEditsAndDeletes(){
  tripDays.forEach(day=>{
    day.activities = day.activities.filter(a=>!activityDeletes[a.sortId]);
    day.activities.forEach(a=>{
      const edit = activityEdits[a.sortId];
      if(edit){ if(edit.time!==undefined)a.time=edit.time; if(edit.title!==undefined)a.title=edit.title; if(edit.desc!==undefined)a.desc=edit.desc; if(edit.budget!==undefined)a.budget=edit.budget; }
    });
  });
}

/* =========================================================
   WEATHER
   ========================================================= */
const weatherCache = {};
async function loadWeatherFor(day){
  const w=day.weather;
  const iconEl=document.getElementById('weather-icon-'+day.id);
  const tempEl=document.getElementById('weather-temp-'+day.id);
  const rangeEl=document.getElementById('weather-range-'+day.id);
  const rainEl=document.getElementById('weather-rain-'+day.id);
  const sourceEl=document.getElementById('weather-source-'+day.id);
  if(!tempEl) return;
  if(weatherCache[day.id]){ paintWeather(day,weatherCache[day.id],iconEl,tempEl,rangeEl,rainEl,sourceEl); return; }
  const today=new Date(); const target=new Date(day.isoDate+'T00:00:00');
  const diffDays=Math.ceil((target-today)/86400000);
  if(diffDays>=0&&diffDays<=15){
    try{
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${w.lat}&longitude=${w.lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Asia%2FTokyo&start_date=${day.isoDate}&end_date=${day.isoDate}`;
      const res=await fetch(url); if(!res.ok) throw new Error();
      const data=await res.json();
      const tMax=data.daily?.temperature_2m_max?.[0]; const tMin=data.daily?.temperature_2m_min?.[0];
      const rain=data.daily?.precipitation_probability_max?.[0]; const code=data.daily?.weathercode?.[0];
      if(tMax===undefined||tMax===null) throw new Error();
      const result={temp:Math.round(tMax)+'°C',tempLow:(tMin!==undefined&&tMin!==null)?Math.round(tMin)+'°C':'',rain:(rain??0)+'%',icon:weatherIconFromCode(code),live:true};
      weatherCache[day.id]=result; paintWeather(day,result,iconEl,tempEl,rangeEl,rainEl,sourceEl); return;
    }catch(e){}
  }
  const fallback={temp:w.temp,tempLow:w.tempLow||'',rain:w.rain,icon:weatherIconFromRain(w.rain),live:false};
  weatherCache[day.id]=fallback; paintWeather(day,fallback,iconEl,tempEl,rangeEl,rainEl,sourceEl);
}
function paintWeather(day,result,iconEl,tempEl,rangeEl,rainEl,sourceEl){
  if(!document.getElementById('weather-temp-'+day.id)) return;
  if(iconEl) iconEl.textContent=result.icon;
  tempEl.textContent=result.temp;
  if(rangeEl) rangeEl.textContent=result.tempLow?('/ '+result.tempLow):'';
  rainEl.textContent='☔ '+result.rain;
  if(result.live){ sourceEl.textContent='📡 即時天氣預報'; sourceEl.classList.add('live'); }
  else{ sourceEl.textContent='歷史氣候參考值（'+day.weather.city+' 8月平均）'; sourceEl.classList.remove('live'); }
}
function weatherIconFromCode(code){
  if(code===undefined||code===null) return '🌤️';
  if(code===0) return '☀️'; if(code<=2) return '🌤️'; if(code<=3) return '⛅';
  if(code<=48) return '🌫️'; if(code<=67) return '🌧️'; if(code<=77) return '❄️';
  if(code<=82) return '🌦️'; if(code<=86) return '🌨️'; if(code<=95) return '⛈️'; return '🌤️';
}
function weatherIconFromRain(rainPct){
  const p=parseInt(rainPct,10)||0;
  if(p>=60) return '🌧️'; if(p>=30) return '🌦️'; if(p>=10) return '🌤️'; return '☀️';
}

  html += '<div class="day-tabs-wrap"><div class="day-tabs">';
  html += `<button class="day-pill overview-pill ${currentDay==='overview'?'active':''}" onclick="selectDay('overview')">🗺️ 戰術總覽</button>`;
  tripDays.forEach(d=>{
    const info=dayDateInfo[d.id]||{weekday:'',date:'',month:''};
    html+=`<button class="day-pill ${currentDay===d.id?'active':''}" onclick="selectDay('${d.id}')">
      <span class="dp-weekday">${info.weekday}</span>
      <span class="dp-date">${info.date}</span>
      <span class="dp-month">${info.month}</span>
    </button>`;
  });
  html+='</div></div>';
  if(currentDay==='overview') html+=renderOverview();
  else { const day=tripDays.find(d=>d.id===currentDay); html+=renderDay(day); }
  html+='</div>';
  document.getElementById('tab-content').innerHTML=html;
  const dayObj=tripDays.find(d=>d.id===currentDay);
  document.getElementById('tab-content').classList.toggle('lego-mode',!!(dayObj&&dayObj.lego));
  if(dayObj){ loadWeatherFor(dayObj); attachDragHandlers(dayObj.id); }
  enableHorizontalScrollDrag('.day-tabs');
}
function selectDay(id){ currentDay=id; renderItinerary(); }

function renderOverview(){
  let html='';
  html+=`<div class="glass-card team-card fade-up">
    <div class="team-label">超神探險隊</div>
    <div class="team-name">${overview.team}</div>
    <div class="team-dates">📅 ${overview.dates}</div>
  </div>`;
  html+='<div class="glass-card fade-up delay-1" style="padding:16px;"><div class="card-title">🧭 移動大動線</div><div class="route-timeline">';
  overview.route.forEach(node=>{
    if(node.type==='transport'){ html+=`<div class="route-connector"><span class="conn-pill">${node.icon}</span><span class="conn-label">${node.label}</span></div>`; }
    else {
      const tags=node.tags?`<div class="route-tags">${node.tags.map(t=>`<span class="route-tag">${t}</span>`).join('')}</div>`:'';
      html+=`<div class="route-node"><div class="route-dot">${node.icon}</div><div class="route-name">${node.name}</div>${tags}</div>`;
    }

  html+='</div></div>';
  html+='<div class="glass-card fade-up delay-2" style="padding:14px;"><div class="card-title">🎒 口袋名單備用區</div>';
  pocketList.forEach(p=>{
    const done=!!checkedItems[p.id];
    html+=`<div class="pocket-item ${done?'done':''}">
      <div class="check-circle ${done?'checked':''}" onclick="toggleCheck('${p.id}')">${done?'✓':''}</div>

  });
  html+='<div style="font-size:11px;color:var(--ink-soft);margin-top:8px;font-weight:600;">有空檔可以加進去的口袋名單！</div>';
  html+='</div>';
  return html;
}

        <div style="font-size:11px;color:var(--ink-soft);font-weight:600;margin:-5px 0 8px;">${act.note||''}</div>

      html+=`<div class="glass-card activity-card ${done?'done':''} fade-up delay-${delay}" draggable="${!isEditing}" data-sortid="${act.sortId}">

          <div class="drag-handle">⠿</div>

function toggleCheck(id){
  checkedItems[id]=!checkedItems[id];
  saveToStorage('jp2026_checked_v1',checkedItems);
  if(currentTab==='itinerary') renderItinerary();
}
function toggleEditActivity(dayId,sortId){ editingActivitySortId=(editingActivitySortId===sortId)?null:sortId; renderItinerary(); }
function cancelEditActivity(){ editingActivitySortId=null; renderItinerary(); }
function saveEditActivity(dayId,sortId){
  const time=document.getElementById('edit-time-'+sortId).value.trim();
  const title=document.getElementById('edit-title-'+sortId).value.trim();
  const desc=document.getElementById('edit-desc-'+sortId).value.trim();
  const budget=document.getElementById('edit-budget-'+sortId).value.trim();
  if(!title){ document.getElementById('edit-title-'+sortId).style.outline='2px solid var(--accent)'; return; }
  const day=tripDays.find(d=>d.id===dayId); const act=day&&day.activities.find(a=>a.sortId===sortId);
  if(act){ act.time=time; act.title=title; act.desc=desc; act.budget=budget||undefined; }
  activityEdits[sortId]={time,title,desc,budget:budget||''};
  saveToStorage('jp2026_act_edits',activityEdits); editingActivitySortId=null; renderItinerary();
}
function deleteActivity(dayId,sortId){
  const day=tripDays.find(d=>d.id===dayId); if(!day) return;
  day.activities=day.activities.filter(a=>a.sortId!==sortId);
  activityDeletes[sortId]=true; saveToStorage('jp2026_act_deletes',activityDeletes);
  delete activityEdits[sortId]; saveToStorage('jp2026_act_edits',activityEdits);
  editingActivitySortId=null; renderItinerary();
}

/* =========================================================
   DRAG & DROP
   ========================================================= */
let dragState=null;
function getDayItemEls(dayId){ const l=document.getElementById('activity-list-'+dayId); return l?Array.from(l.children):[]; }
function persistOrderFromDOM(dayId){
  const els=getDayItemEls(dayId);
  const order=els.map(el=>el.dataset.sortid).filter(Boolean);
  savedOrder[dayId]=order; saveToStorage('jp2026_order_v1',savedOrder);
  const day=tripDays.find(d=>d.id===dayId); if(!day) return;
  const bySort={}; day.activities.forEach(a=>{ bySort[a.sortId]=a; });
  const reordered=[]; order.forEach(sid=>{ if(bySort[sid]){ reordered.push(bySort[sid]); delete bySort[sid]; } });
  Object.values(bySort).forEach(a=>reordered.push(a));
  if(reordered.length) day.activities=reordered;
}
function attachDragHandlers(dayId){
  const list=document.getElementById('activity-list-'+dayId); if(!list) return;
  Array.from(list.children).forEach(item=>{
    if(!item.dataset.sortid) return;
    item.addEventListener('dragstart',e=>{ dragState={dayId,el:item}; item.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    item.addEventListener('dragend',()=>{ item.classList.remove('dragging'); if(dragState) persistOrderFromDOM(dayId); dragState=null; });
    item.addEventListener('dragover',e=>{ e.preventDefault(); item.classList.add('drag-over'); });
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault(); item.classList.remove('drag-over');
      if(!dragState||dragState.el===item) return;
      const rect=item.getBoundingClientRect(); const before=(e.clientY-rect.top)<rect.height/2;
      if(before) list.insertBefore(dragState.el,item); else list.insertBefore(dragState.el,item.nextSibling);
    });
  });
}

    </div>`;
  }

  html+=`<div class="glass-card dragonball-section fade-up delay-1">
    <div class="dragonball-header">
      <div class="dragonball-title">🐉 景點集章龍珠任務</div>

  dbSpots.forEach((spot,i)=>{

    html+=`<div class="db-item" onclick="unlockDragonBall('${spot.id}',event)">
      <div class="db-orb ${unlocked?'unlocked':'locked'}">
        ${unlocked?`<div class="db-stars">${spot.stars}</div><div class="db-icon-inner">${spot.icon}</div>`:'<span style="font-size:20px;opacity:0.3">◯</span>'}

  });

    <div style="text-align:center;margin-top:14px;font-size:11px;color:var(--ink-soft);font-weight:600;">
      已集章 ${Object.keys(dbUnlocked).filter(k=>dbUnlocked[k]).length} / 7 顆龍珠
    </div>
  </div></div>`;
  document.getElementById('tab-content').innerHTML=html;
}

function unlockDragonBall(id, evt){
  if(dbUnlocked[id]) return;
  dbUnlocked[id]=true;
  saveToStorage('jp2026_db_unlocked',dbUnlocked);
  // Burst animation
  const overlay=document.getElementById('burst-overlay');
  overlay.innerHTML='';
  const rect=evt.currentTarget.getBoundingClientRect();
  const cx=rect.left+rect.width/2; const cy=rect.top+rect.height/2;
  const flash=document.createElement('div');
  flash.className='burst-flash';
  flash.style.cssText=`position:fixed;left:${cx-50}px;top:${cy-50}px;width:100px;height:100px;`;
  overlay.appendChild(flash);
  const colors=['#FF3B30','#FFD700','#007AFF','#FF6B6B','#FFB800','#FF3B30'];
  for(let i=0;i<16;i++){
    const p=document.createElement('div');
    const angle=(i/16)*360; const dist=60+Math.random()*60;
    const tx=Math.cos(angle*Math.PI/180)*dist+'px'; const ty=Math.sin(angle*Math.PI/180)*dist+'px';
    p.className='burst-particle';
    p.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};--tx:${tx};--ty:${ty};animation-delay:${i*0.02}s;`;
    overlay.appendChild(p);
  }
  setTimeout(()=>{ overlay.innerHTML=''; },800);
  // Check if all 7 collected
  const allDone=dbSpots.every(s=>dbUnlocked[s.id]);
  if(allDone){ triggerDragonCelebration(); }
  else { renderDragonBalls(); }
}

function triggerDragonCelebration(){
  const cel=document.createElement('div');
  cel.className='saiyan-celebrate';
  document.body.appendChild(cel);
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    const colors=['#FF3B30','#FFD700','#007AFF','#FF6B6B','#22C55E','#A855F7'];
    c.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;top:-20px;border-radius:${Math.random()>0.5?'50%':'2px'};`;
    cel.appendChild(c);
  }
  setTimeout(()=>{ cel.remove(); renderDragonBalls(); },3000);
}

/* =========================================================
   RENDER: PACKING
   ========================================================= */
function getPackingCategoryItems(ci,cat){
  const items=[];
  cat.items.forEach((item,ii)=>{
    const key=ci+'-'+ii;
    if(packingItemDeletes[key]) return;
    items.push({key,text:packingItemEdits[key]!==undefined?packingItemEdits[key]:item,isCustom:false});
  });
  packingCustomItems.filter(c=>c.cat===ci).forEach(c=>{
    if(packingItemDeletes[c.key]) return;
    items.push({key:c.key,text:packingItemEdits[c.key]!==undefined?packingItemEdits[c.key]:c.text,isCustom:true});
  });
  return items;
}
function renderPacking(){
  let total=0,done=0;
  packingData.forEach((cat,ci)=>{ getPackingCategoryItems(ci,cat).forEach(it=>{ total++; if(packingChecked[it.key]) done++; }); });
  const pct=total?Math.round(done/total*100):0;
  let html='<div class="tab-inner">';
  html+=`<div class="glass-card progress-wrap fade-up">
    <div class="progress-headline"><div class="big"><span>${pct}%</span> 戰力裝備完成</div><div class="small">${done} / ${total}</div></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
  </div>`;
  packingData.forEach((cat,ci)=>{
    html+=`<div class="glass-card fade-up" style="padding:14px;"><div class="pack-cat-title">${cat.icon} ${cat.cat}</div>`;
    getPackingCategoryItems(ci,cat).forEach(it=>{
      const isDone=!!packingChecked[it.key]; const isEditing=editingPackKey===it.key;
      html+=`<div class="pack-item ${isDone?'done':''}" id="pack-item-${it.key}" style="flex-direction:column;align-items:stretch;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="check-circle ${isDone?'checked':''}" onclick="togglePack('${it.key}')">${isDone?'✓':''}</div>
          <div class="pack-text">${escapeH(it.text)}</div>
          <div class="item-actions">
            <button class="more-btn" onclick="toggleMorePopover('pack-${it.key}',event)">⋯</button>
            <div class="more-popover" id="more-pack-${it.key}">
              <button onclick="toggleEditPack('${it.key}')">✏️ 編輯</button>
              <button class="danger" onclick="deletePackItem('${it.key}')">🗑️ 刪除</button>
            </div>
          </div>
        </div>
        ${isEditing?`<div class="inline-edit-form"><input type="text" id="edit-pack-${it.key}" value="${escapeH(it.text)}">
          <div class="inline-edit-actions">
            <button class="btn-cancel" onclick="cancelEditPack()">取消</button>
            <button class="btn-save" onclick="savePackEdit('${it.key}')">儲存</button>
          </div></div>`:''}
      </div>`;
    });
    html+=`<div class="shop-add-row" style="margin-top:8px;">
      <input type="text" id="pack-new-input-${ci}" placeholder="新增 ${cat.cat} 項目..." onkeydown="if(event.key==='Enter')addPackItem(${ci})">
      <button class="shop-add-btn" onclick="addPackItem(${ci})">＋</button>
    </div></div>`;
  });
  html+='</div>';
  document.getElementById('tab-content').innerHTML=html;
}
function togglePack(key){
  packingChecked[key]=!packingChecked[key];
  saveToStorage('jp2026_packing_v1',packingChecked);
  // ATK popup
  const item=document.getElementById('pack-item-'+key);
  if(item&&packingChecked[key]){
    const pop=document.createElement('div'); pop.className='atk-popup'; pop.textContent='+1000 ATK';
    item.style.position='relative'; item.appendChild(pop);
    setTimeout(()=>pop.remove(),1300);
  }
  renderPacking();
}
function toggleEditPack(key){ editingPackKey=(editingPackKey===key)?null:key; renderPacking(); }
function cancelEditPack(){ editingPackKey=null; renderPacking(); }
function savePackEdit(key){
  const input=document.getElementById('edit-pack-'+key); const text=input.value.trim();
  if(!text){ input.style.outline='2px solid var(--accent)'; return; }
  packingItemEdits[key]=text; saveToStorage('jp2026_pack_edits',packingItemEdits);
  const custom=packingCustomItems.find(c=>c.key===key); if(custom) custom.text=text;
  saveToStorage('jp2026_pack_custom',packingCustomItems); editingPackKey=null; renderPacking();
}
function deletePackItem(key){
  packingItemDeletes[key]=true; saveToStorage('jp2026_pack_deletes',packingItemDeletes);
  packingCustomItems=packingCustomItems.filter(c=>c.key!==key); saveToStorage('jp2026_pack_custom',packingCustomItems);
  delete packingChecked[key]; saveToStorage('jp2026_packing_v1',packingChecked); renderPacking();
}
function addPackItem(ci){
  const input=document.getElementById('pack-new-input-'+ci); const text=(input.value||'').trim();
  if(!text) return;
  const key='custom-pack-'+Date.now(); packingCustomItems.push({key,cat:ci,text});
  saveToStorage('jp2026_pack_custom',packingCustomItems); input.value=''; renderPacking();
}

function addShopItem(){

   RENDER: EXPENSE
   ========================================================= */
const expCatIcons = {'交通':'🚄','住宿':'🏨','餐飲':'🍱','門票/娛樂':'🎟️','雜支/採購':'🛍️'};
function renderExpense(){
  const allExpenses=Object.values(dailyExpenses).flat();
  const grandTotal=allExpenses.reduce((s,e)=>s+e.amount,0);
  const payerTotals={};
  allExpenses.forEach(e=>{ payerTotals[e.payer]=(payerTotals[e.payer]||0)+e.amount; });
  let html='<div class="tab-inner">';
  html+=`<div class="glass-card total-card fade-up">
    <div class="total-label">全程總花費（含預估）</div>
    <div class="total-amount">¥ ${grandTotal.toLocaleString()}</div>
    <div class="total-sub">≈ NT$ ${Math.round(grandTotal*0.22).toLocaleString()}</div>
    <div class="payer-split">
      ${Object.entries(payerTotals).map(([p,a])=>`<div class="payer-chip"><div class="pname">${p}</div><div class="pamt">¥ ${a.toLocaleString()}</div></div>`).join('')}
    </div>
  </div>`;

  // Day tabs
  html+='<div class="day-tabs-wrap"><div class="day-tabs" id="expense-day-tabs">';
  Object.keys(dailyExpenses).forEach(dkey=>{
    const info=dayDateInfo[dkey]; const label=info?`${info.weekday} ${info.date}/${info.month.replace('月','')}`:dkey;
    html+=`<button class="day-pill ${currentExpenseDay===dkey?'active':''}" onclick="selectExpenseDay('${dkey}')" style="min-width:64px;">
      <span class="dp-weekday">${info?info.weekday:''}</span>
      <span class="dp-date">${info?info.date:''}</span>
      <span class="dp-month">${info?info.month:''}</span>
    </button>`;
  });
  html+='</div></div>';

  const exps=dailyExpenses[currentExpenseDay]||[];
  const dayTotal=exps.reduce((s,e)=>s+e.amount,0);
  html+=`<div class="glass-card fade-up" style="padding:14px;">
    <div class="day-expense-head">
      <div class="dlabel">${dayLabels[currentExpenseDay]}</div>
      <div class="dtotal">¥ ${dayTotal.toLocaleString()}</div>
    </div>`;
  exps.forEach(e=>{
    html+=`<div class="expense-row" onclick="openEditExpense('${currentExpenseDay}','${e.id}')">
      <div class="expense-icon">${expCatIcons[e.cat]||'💴'}</div>
      <div class="expense-info"><div class="expense-name">${escapeH(e.name)}</div><div class="expense-payer">${e.payer}</div></div>
      <div class="expense-amt">¥ ${e.amount.toLocaleString()}</div>
    </div>`;
    if(editingExpenseId===e.id){ html+=renderExpenseForm(e,false,currentExpenseDay); }
  });
  if(expenseFormOpenDay===currentExpenseDay&&!editingExpenseId){ html+=renderExpenseForm(null,true,currentExpenseDay); }
  html+=`<button class="add-expense-btn" onclick="toggleAddExpense('${currentExpenseDay}')">＋ 新增費用</button>`;

  // Currency
  html+=`<div class="glass-section-header" style="margin-top:16px;"><div class="title">💱 日圓換算</div></div>
    <div class="convert-row">
      <input type="number" id="jpy-input" placeholder="日幣金額 JPY" oninput="convertJPY()" style="flex:1;">
    </div>
    <div class="convert-result" id="convert-result">輸入金額後立即換算</div>
  </div></div>`;
  document.getElementById('tab-content').innerHTML=html;
  enableHorizontalScrollDrag('#expense-day-tabs');
}
function renderExpenseForm(e,isNew,dayId){
  const id=e?e.id:''; const cats=Object.keys(expCatIcons);
  return `<div class="exp-form open" id="exp-form-${dayId}">
    <input type="text" id="exp-name" placeholder="費用名稱" value="${e?escapeH(e.name):''}">
    <div class="exp-form-row">
      <input type="number" id="exp-amount" placeholder="金額 (JPY)" value="${e?e.amount:''}">
      <select id="exp-cat">${cats.map(c=>`<option value="${c}" ${e&&e.cat===c?'selected':''}>${c}</option>`).join('')}</select>
    </div>
    <input type="text" id="exp-payer" placeholder="付款人" value="${e?escapeH(e.payer):''}">
    <div class="exp-form-actions">
      ${!isNew?`<button class="exp-delete-btn" onclick="deleteExpense('${dayId}','${id}')">刪除</button>`:''}
      <button class="exp-save-btn" onclick="saveExpense('${dayId}','${id}',${isNew})">${isNew?'新增':'更新'}</button>
    </div>
  </div>`;
}
function selectExpenseDay(d){ currentExpenseDay=d; editingExpenseId=null; expenseFormOpenDay=null; renderExpense(); }
function openEditExpense(dayId,id){ editingExpenseId=(editingExpenseId===id)?null:id; expenseFormOpenDay=null; renderExpense(); }
function toggleAddExpense(dayId){ expenseFormOpenDay=(expenseFormOpenDay===dayId)?null:dayId; editingExpenseId=null; renderExpense(); }
function saveExpense(dayId,id,isNew){
  const name=(document.getElementById('exp-name').value||'').trim();
  const amount=parseInt(document.getElementById('exp-amount').value)||0;
  const cat=document.getElementById('exp-cat').value;
  const payer=(document.getElementById('exp-payer').value||'').trim();
  if(!name||!amount) return;
  if(isNew){ dailyExpenses[dayId].push({id:'e-'+Date.now(),name,cat,amount,payer}); expenseFormOpenDay=null; }
  else { const e=dailyExpenses[dayId].find(x=>x.id===id); if(e){ e.name=name; e.cat=cat; e.amount=amount; e.payer=payer; } editingExpenseId=null; }
  saveToStorage('jp2026_expenses',dailyExpenses); renderExpense();
}
function deleteExpense(dayId,id){
  dailyExpenses[dayId]=dailyExpenses[dayId].filter(e=>e.id!==id);
  editingExpenseId=null; saveToStorage('jp2026_expenses',dailyExpenses); renderExpense();
}
function convertJPY(){
  const v=parseFloat(document.getElementById('jpy-input').value)||0;
  const r=document.getElementById('convert-result');
  if(!v){ r.textContent='輸入金額後立即換算'; return; }
  r.textContent=`¥ ${v.toLocaleString()} ≈ NT$ ${Math.round(v*0.22).toLocaleString()} / USD ${(v*0.0067).toFixed(2)}`;
}

/* =========================================================
   RENDER: SOS
   ========================================================= */
function renderSOS(){
  let html='<div class="tab-inner">';
  html+=`<div class="glass-section-header fade-up"><div class="title">🆘 緊急聯絡</div><div class="sub">遇到緊急情況先保持冷靜，再撥打相應號碼</div></div>`;
  sosEmergency.forEach((s,i)=>{
    html+=`<a class="sos-big glass-card fade-up delay-${i+1}" href="tel:${s.number}">
      <div class="sos-icon ${s.cls}">${s.icon}</div>
      <div><div class="sos-name">${s.name}</div><div class="sos-number">${s.number}</div><div class="sos-note">${s.note}</div></div>
    </a>`;
  });
  html+=`<div class="glass-section-header fade-up"><div class="title">🏨 飯店聯絡</div></div>`;
  sosHotels.forEach((h,i)=>{
    html+=`<div class="hotel-card fade-up delay-${i+1}">
      <div class="hotel-name">${h.name}</div><div class="hotel-city">📍 ${h.city}</div>
      <div class="hotel-row">
        <input type="tel" id="hotel-tel-${i}" placeholder="飯店電話">
        <button class="call-btn" onclick="callHotel(${i})">📞 撥打</button>
      </div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('tab-content').innerHTML=html;
}
function callHotel(i){
  const input=document.getElementById('hotel-tel-'+i); const num=(input.value||'').trim();
  if(!num){ input.focus(); input.placeholder='請先輸入飯店電話'; return; }
  window.location.href='tel:'+num.replace(/[^0-9+]/g,'');
}

/* =========================================================
   TAB SWITCHING
   ========================================================= */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(btn=>{ btn.classList.toggle('active',btn.dataset.tab===tab); });
  document.getElementById('tab-content').classList.remove('lego-mode');
  if(tab==='itinerary') renderItinerary();
  else if(tab==='dragonballs') renderDragonBalls();
  else if(tab==='packing') renderPacking();
  else if(tab==='shopping') renderShopping();
  else if(tab==='expense') renderExpense();
  else if(tab==='sos') renderSOS();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* =========================================================
   MAPS POPUP
   ========================================================= */
function openMapsPopup(title,query){
  document.getElementById('maps-sheet-title').textContent='導覽至「'+title+'」';
  const q=encodeURIComponent(query);
  document.getElementById('maps-google').href=`https://www.google.com/maps/search/?api=1&query=${q}`;
  document.getElementById('maps-apple').href=`https://maps.apple.com/?q=${q}`;
  document.getElementById('maps-overlay').classList.add('show');
}
function closeMapsPopup(){ document.getElementById('maps-overlay').classList.remove('show'); }
function closeMapsPopupOutside(e){ if(e.target.id==='maps-overlay') closeMapsPopup(); }

/* =========================================================
   AI CHAT
   ========================================================= */
function toggleAIChat(){
  const modal=document.getElementById('ai-modal');
  const opening=!modal.classList.contains('show');
  modal.classList.toggle('show');
  if(opening&&document.getElementById('ai-body').children.length===0) seedAIChat();
}
function closeAIChatOutside(e){ if(e.target.id==='ai-modal') toggleAIChat(); }
function appendBubble(text,who){
  const body=document.getElementById('ai-body');
  const div=document.createElement('div'); div.className='bubble '+who; div.textContent=text;
  body.appendChild(div); body.scrollTop=body.scrollHeight; return div;
}
function seedAIChat(){
  const body=document.getElementById('ai-body'); body.innerHTML='';
  appendBubble('嗨！我是超神旅遊助手 🐉 隨時可以問我這趟親子旅程的任何問題！','assistant');
  aiPresetTopics.forEach(t=>{ appendBubble(t.user,'user'); appendBubble(t.reply,'assistant'); });
}
function sendAIMessage(){
  const input=document.getElementById('ai-input'); const text=(input.value||'').trim(); if(!text) return;
  appendBubble(text,'user'); input.value='';
  const typing=appendBubble('✦ 戰鬥力蓄積中...','assistant');
  setTimeout(()=>{ typing.remove(); const topic=aiPresetTopics[aiTopicIndex%aiPresetTopics.length]; aiTopicIndex++; appendBubble('收到！'+topic.reply,'assistant'); },700);
}

/* =========================================================
   HORIZONTAL SCROLL DRAG (desktop)
   ========================================================= */
function enableHorizontalScrollDrag(selector){
  document.querySelectorAll(selector).forEach(el=>{
    if(el.dataset.hscrollBound) return; el.dataset.hscrollBound='1';
    let isDown=false,startX=0,startScroll=0;
    el.addEventListener('mousedown',e=>{ isDown=true; startX=e.pageX; startScroll=el.scrollLeft; el.style.cursor='grabbing'; });
    window.addEventListener('mouseup',()=>{ isDown=false; el.style.cursor=''; });
    window.addEventListener('mousemove',e=>{ if(!isDown) return; e.preventDefault(); el.scrollLeft=startScroll-(e.pageX-startX); });
    el.addEventListener('click',e=>{ if(Math.abs(el.scrollLeft-startScroll)>5){ e.stopPropagation(); e.preventDefault(); } },true);
    el.addEventListener('wheel',e=>{ if(Math.abs(e.deltaY)>Math.abs(e.deltaX)){ el.scrollLeft+=e.deltaY; e.preventDefault(); } },{passive:false});
  });
}

/* =========================================================
   INIT
   ========================================================= */
initStorage();
renderItinerary();
document.querySelector('.nav-tab[data-tab="itinerary"]').classList.add('active');
</script>
